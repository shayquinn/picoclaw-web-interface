<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline';
                   style-src 'self' 'unsafe-inline';
                   connect-src 'self';
                   media-src 'self' blob:;
                   img-src 'self' data:;">
    <title>PicoClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Register --s so the browser can interpolate it as a length */
        @property --s {
            syntax: '<length>';
            inherits: true;
            initial-value: 130px;
        }

        /* ── Geometric background pattern (seasonal colours via --c1/c2/c3) ── */
        html {
            --s:  130px;
            --c1: #3730a3;
            --c2: #6366f1;
            --c3: #4f46e5;
            --_g: var(--c1) 10%,var(--c2) 10.5% 19%,#0000 19.5% 80.5%,var(--c2) 81% 89.5%,var(--c3) 90%;
            --_c: from -90deg at 37.5% 50%,#0000 75%;
            --_l1: linear-gradient(145deg,var(--_g));
            --_l2: linear-gradient( 35deg,var(--_g));
        }
        html::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                var(--_l1) 50% 50%,
                var(--_l1) calc(50% + var(--s)/2) calc(50% + var(--s)),
                var(--_l2) 50% 50%,
                var(--_l2) calc(50% + var(--s)/2) calc(50% + var(--s)),
                conic-gradient(var(--_c),var(--c1) 0) calc(50% + var(--s)/8) 50%,
                conic-gradient(var(--_c),var(--c3) 0) calc(50% + var(--s)/2) 50%,
                linear-gradient(90deg,var(--c3) 38%,var(--c1) 0 50%,var(--c3) 0 62%,var(--c1) 0) 50% 50%;
            background-size: var(--s) calc(2*var(--s)/3);
            /* Slow breathe — animates --s so positions + size all scale together */
            --s: 111px;
            animation: patternBreathe 120s ease-in-out infinite;
        }
        /* Shared breathe keyframe — animates --s between the two tile sizes.
           Layers are anchored at 50% 50% so the pattern breathes from the
           centre of the element rather than the top-left corner. */
        @keyframes patternBreathe {
            0%,100% { --s: 120px; }
            50%      { --s: 140px; }
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100%;
            overflow: hidden;
            /* background removed — html::before provides the pattern */
        }

        .container {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            position: relative;
            overflow: hidden;
            color: white;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            /* Fallback solid colour (overridden by ::before pattern) */
            background: transparent;
        }
        /* Pattern tile pinned to the header — animates --s so all positions + size breathe in sync */
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            background:
                var(--_l1) 50% 50%,
                var(--_l1) calc(50% + var(--s)/2) calc(50% + var(--s)),
                var(--_l2) 50% 50%,
                var(--_l2) calc(50% + var(--s)/2) calc(50% + var(--s)),
                conic-gradient(var(--_c),var(--c1) 0) calc(50% + var(--s)/8) 50%,
                conic-gradient(var(--_c),var(--c3) 0) calc(50% + var(--s)/2) 50%,
                linear-gradient(90deg,var(--c3) 38%,var(--c1) 0 50%,var(--c3) 0 62%,var(--c1) 0) 50% 50%;
            background-size: var(--s) calc(2*var(--s)/3);
            --s: 111px;
            animation: patternBreathe 90s ease-in-out infinite;
            filter: brightness(0.75) saturate(1.2);
        }
        /* All direct children sit above the pattern */
        .header > * { position: relative; z-index: 1; }
        .header h1 { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .header .subtitle { margin-left: auto; opacity: 0.65; font-size: 0.8rem; }

        /* App body */
        .app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

        /* Sidebar */
        .sidebar {
            width: 210px;
            min-width: 130px;
            max-width: 480px;
            flex-shrink: 0;
            background: #f8f9fb;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 12px 8px;
            gap: 4px;
            overflow: hidden;
        }

        /* Resize handle */
        .sidebar-resize {
            width: 5px;
            flex-shrink: 0;
            cursor: col-resize;
            background: transparent;
            transition: background 0.15s;
            z-index: 10;
            position: relative;
        }
        .sidebar-resize:hover, .sidebar-resize.dragging { background: rgba(99,102,241,0.45); }

        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 12px;
            background: #4338ca;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 0.87rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .new-chat-btn:hover { background: #3730a3; }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #9ca3af;
            padding: 10px 6px 2px;
            flex-shrink: 0;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-height: 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 8px 9px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.86rem;
            color: #374151;
            transition: background 0.15s;
            gap: 6px;
            min-width: 0;
            overflow: hidden;
        }
        .chat-item:hover { background: #ede9fe; }
        .chat-item.active { background: #ede9fe; color: #4338ca; font-weight: 600; }
        .chat-item-icon { flex-shrink: 0; font-size: 0.85rem; opacity: 0.5; }

        /* Name: gradient fade at right edge */
        .chat-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            min-width: 0;
            -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);
            mask-image: linear-gradient(to right, black 70%, transparent 100%);
        }
        .chat-item-name[contenteditable="true"] {
            outline: none;
            background: white;
            border-radius: 4px;
            padding: 1px 4px;
            -webkit-mask-image: none;
            mask-image: none;
            min-width: 60px;
        }

        .chat-item-delete {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            border-radius: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
        }
        .chat-item:hover .chat-item-delete { display: flex; }
        .chat-item-delete:hover { background: #fca5a5; color: #dc2626; }
        .chat-item-rename {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            border-radius: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
        }
        .chat-item:hover .chat-item-rename { display: flex; }
        .chat-item-rename:hover { background: #e0e7ff; color: #4338ca; }

        /* Main area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 18px 26px 14px;
            gap: 10px;
            min-width: 0;
        }

        .chat-title-bar {
            font-size: 0.93rem;
            font-weight: 600;
            color: #374151;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
        .chat-title-bar:hover::after { content: ' ✏'; opacity: 0.4; font-size: 0.8rem; }

        .messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px 22px;
            background: #f9fafb;
            min-height: 0;
        }

        .message {
            margin-bottom: 14px;
            padding: 11px 15px;
            border-radius: 12px;
            max-width: 78%;
            animation: fadeIn 0.22s ease;
            font-size: 0.93rem;
            line-height: 1.55;
        }
        .message.user { background: #4338ca; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .message.assistant { background: white; color: #1f2937; border: 1px solid #e5e7eb; margin-right: auto; border-bottom-left-radius: 4px; }
        .message.system {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
            margin: 0 auto 14px;
            text-align: center;
            font-size: 0.83rem;
            max-width: 92%;
        }
        .message-meta { font-size: 0.73rem; font-weight: 600; margin-bottom: 4px; opacity: 0.65; }
        .message { position: relative; cursor: pointer; }
        .message.tts-selected { outline: 2px solid #a5b4fc; outline-offset: 2px; }
        .message.tts-reading  { outline: 2px solid #6366f1; outline-offset: 2px; box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }
        @media (prefers-color-scheme: dark) {
            .message.tts-selected { outline-color: #818cf8; }
            .message.tts-reading  { outline-color: #818cf8; box-shadow: 0 0 0 4px rgba(129,140,248,0.18); }
        }

        .input-area { display: flex; gap: 9px; flex-shrink: 0; }
        .input-area input {
            flex: 1;
            padding: 12px 17px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.93rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: white;
            color: #1f2937;
            min-width: 0;
        }
        .input-area input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .input-area input.listening {
            border-color: #ef4444;
            background: linear-gradient(
                to right,
                rgba(239,68,68, var(--audio-level, 0.08)) 0%,
                rgba(249,168,212, calc(var(--audio-level, 0.08) * 0.6)) calc(var(--audio-pct, 18%) * 1.2),
                transparent var(--audio-pct, 18%)
            );
        }
        @keyframes transcribeSweep {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        .input-area input.transcribing {
            border-color: #fbbf24;
            background: linear-gradient(90deg,
                transparent 0%, rgba(251,191,36,0.18) 40%, rgba(251,191,36,0.35) 50%, rgba(251,191,36,0.18) 60%, transparent 100%
            );
            background-size: 200% 100%;
            animation: transcribeSweep 1.2s linear infinite;
            color: #92400e;
        }
        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #4338ca 0%, #5b21b6 100%);
            color: white;
            border: 1.5px solid transparent;
            border-radius: 12px;
            font-size: 0.93rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .input-area button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(67,56,202,0.28); border-color: #a5b4fc; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .bottom-bar { display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }

        .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #6b7280; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; flex-shrink: 0; }
        .status-dot.connecting { background: #f59e0b; }
        .status-dot.error { background: #ef4444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes typingPulse { 0%, 60%, 100% { transform: scale(1); opacity: 0.5; } 30% { transform: scale(1.2); opacity: 1; } }
        .typing-dot { width: 8px; height: 8px; background: #4338ca; border-radius: 50%; animation: typingPulse 1.4s infinite; }

        @media (max-width: 680px) {
            .sidebar { display: none; }
            .sidebar-resize { display: none; }
            .main-area { padding: 12px; }
        }

        @media (prefers-color-scheme: dark) {
            /* html::before shows the pattern; container is frosted dark glass */
            .container { background: rgba(17,24,39,0.90); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
            .sidebar { background: #111827; border-color: #374151; }
            .sidebar-label { color: #6b7280; }
            .chat-item { color: #d1d5db; }
            .chat-item:hover { background: #1e2a3a; }
            .chat-item.active { background: #2d3748; color: #a5b4fc; }
            .chat-item-name[contenteditable="true"] { background: #374151; color: #f9fafb; }
            .chat-title-bar { color: #f9fafb; }
            .messages { background: #111827; border-color: #374151; }
            .message.assistant { background: #1f2937; color: #f9fafb; border-color: #374151; }
            .message.system { background: #422006; color: #fcd34d; border-color: #92400e; }
            .input-area input { background: #111827; border-color: #374151; color: #f9fafb; }
            .input-area input::placeholder { color: #6b7280; }
            .input-area input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
            .input-area input.transcribing {
                border-color: #fbbf24;
                background: linear-gradient(90deg,
                    transparent 0%, rgba(251,191,36,0.12) 40%, rgba(251,191,36,0.25) 50%, rgba(251,191,36,0.12) 60%, transparent 100%
                );
                background-size: 200% 100%;
                animation: transcribeSweep 1.2s linear infinite;
                color: #fcd34d;
            }
            .input-area input.listening {
                border-color: #f87171;
                background: linear-gradient(
                    to right,
                    rgba(239,68,68, var(--audio-level, 0.15)) 0%,
                    rgba(190,18,60, calc(var(--audio-level, 0.08) * 0.5)) calc(var(--audio-pct, 18%) * 1.2),
                    #111827 var(--audio-pct, 18%)
                );
            }
            .status-indicator { color: #9ca3af; }
            .typing-dot { background: #818cf8; }
            .sidebar-resize:hover, .sidebar-resize.dragging { background: rgba(129,140,248,0.4); }
        }

        /* ── Seasonal + time-of-day themes ──────────────────────────────────── */
        #themeIndicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            opacity: 0.9;
        }
        .theme-emoji { font-size: 1.6rem; display: inline-block; line-height: 1; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.35)); }

        /* ── Pattern colour overrides per season ── */
        html[data-season="spring"] { --c1: #276749; --c2: #34d399; --c3: #059669; }
        html[data-season="summer"] { --c1: #0369a1; --c2: #38bdf8; --c3: #0077b6; }
        html[data-season="autumn"] { --c1: #92400e; --c2: #fcd34d; --c3: #d97706; }
        html[data-season="winter"] { --c1: #1e3a8a; --c2: #93c5fd; --c3: #0e7490; }

        /* Spring — pattern colours set via html vars, no need to override .header background */
        html[data-season="spring"] .header          { /* colour via --c1/c2/c3 */ }
        html[data-season="spring"] .new-chat-btn    { background: #276749; }
        html[data-season="spring"] .new-chat-btn:hover { background: #1a4731; }
        html[data-season="spring"] .message.user    { background: #276749; }
        html[data-season="spring"] .input-area button { background: linear-gradient(135deg, #276749 0%, #059669 100%); }
        html[data-season="spring"] .input-area button:hover { box-shadow: 0 6px 16px rgba(39,103,73,0.28); }
        html[data-season="spring"] .chat-item.active { color: #276749; background: #d1fae5; }
        html[data-season="spring"] .input-area input:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.12); }
        html[data-season="spring"] .sidebar-resize:hover,
        html[data-season="spring"] .sidebar-resize.dragging { background: rgba(5,150,105,0.4); }

        /* Summer */
        html[data-season="summer"] .header          { /* colour via --c1/c2/c3 */ }
        html[data-season="summer"] .new-chat-btn    { background: #0077b6; }
        html[data-season="summer"] .new-chat-btn:hover { background: #005f94; }
        html[data-season="summer"] .message.user    { background: #0077b6; }
        html[data-season="summer"] .input-area button { background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%); }
        html[data-season="summer"] .input-area button:hover { box-shadow: 0 6px 16px rgba(0,119,182,0.28); }
        html[data-season="summer"] .chat-item.active { color: #0077b6; background: #e0f2fe; }
        html[data-season="summer"] .input-area input:focus { border-color: #00b4d8; box-shadow: 0 0 0 3px rgba(0,180,216,0.12); }
        html[data-season="summer"] .sidebar-resize:hover,
        html[data-season="summer"] .sidebar-resize.dragging { background: rgba(0,180,216,0.4); }

        /* Autumn */
        html[data-season="autumn"] .header          { /* colour via --c1/c2/c3 */ }
        html[data-season="autumn"] .new-chat-btn    { background: #92400e; }
        html[data-season="autumn"] .new-chat-btn:hover { background: #78350f; }
        html[data-season="autumn"] .message.user    { background: #b45309; }
        html[data-season="autumn"] .input-area button { background: linear-gradient(135deg, #92400e 0%, #d97706 100%); }
        html[data-season="autumn"] .input-area button:hover { box-shadow: 0 6px 16px rgba(146,64,14,0.28); }
        html[data-season="autumn"] .chat-item.active { color: #92400e; background: #fef3c7; }
        html[data-season="autumn"] .input-area input:focus { border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.12); }
        html[data-season="autumn"] .sidebar-resize:hover,
        html[data-season="autumn"] .sidebar-resize.dragging { background: rgba(217,119,6,0.4); }

        /* Winter */
        html[data-season="winter"] .header          { /* colour via --c1/c2/c3 */ }
        html[data-season="winter"] .new-chat-btn    { background: #1e3a8a; }
        html[data-season="winter"] .new-chat-btn:hover { background: #1e40af; }
        html[data-season="winter"] .message.user    { background: #1e3a8a; }
        html[data-season="winter"] .input-area button { background: linear-gradient(135deg, #1e3a8a 0%, #0e7490 100%); }
        html[data-season="winter"] .input-area button:hover { box-shadow: 0 6px 16px rgba(30,58,138,0.28); }
        html[data-season="winter"] .chat-item.active { color: #1e3a8a; background: #dbeafe; }
        html[data-season="winter"] .input-area input:focus { border-color: #0e7490; box-shadow: 0 0 0 3px rgba(14,116,144,0.12); }
        html[data-season="winter"] .sidebar-resize:hover,
        html[data-season="winter"] .sidebar-resize.dragging { background: rgba(14,116,144,0.4); }

        /* ── TTS settings popover ────────────────────────────────────────────── */
        .tts-settings-btn {
            padding: 8px 9px;
            background: #f3f4f6;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .tts-settings-btn:hover { background: #ede9fe; border-color: #a5b4fc; color: #4338ca; }
        .tts-popover {
            display: none;
            position: absolute;
            bottom: calc(100% + 10px);
            right: 0;
            width: 270px;
            background: #fff;
            border: 1.5px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
            padding: 16px 18px;
            z-index: 200;
            font-size: 0.88rem;
            color: #374151;
        }
        .tts-popover.open { display: block; }
        .tts-popover label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.82rem; color: #6b7280; }
        .tts-popover select, .tts-popover input[type=range] { width: 100%; margin-bottom: 12px; }
        .tts-popover select { padding: 5px 8px; border: 1.5px solid #e5e7eb; border-radius: 8px; background: #f9fafb; }
        .tts-popover .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .tts-popover .val { font-size: 0.8rem; color: #6366f1; font-weight: 700; min-width: 28px; text-align: right; }
        @media (prefers-color-scheme: dark) {
            .tts-settings-btn { background: #1f2937; color: #9ca3af; border-color: #374151; }
            .tts-settings-btn:hover { background: #2d3748; border-color: #818cf8; color: #a5b4fc; }
            .tts-popover { background: #1f2937; border-color: #374151; color: #d1d5db; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
            .tts-popover select { background: #111827; border-color: #374151; color: #d1d5db; }
        }
        /* ── Voice controls ──────────────────────────────────────────────────── */
        .mic-btn, .tts-btn, .tts-pause-btn, .tts-stop-btn {
            padding: 12px 14px;
            background: #f3f4f6;
            color: #374151;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .mic-btn:hover, .tts-btn:hover,
        .tts-pause-btn:hover, .tts-stop-btn:hover { background: #ede9fe; border-color: #a5b4fc; }
        .mic-btn.recording  { background: #fee2e2; border-color: #fca5a5; color: #dc2626; animation: micPulse 1s infinite; }
        .mic-btn.processing { background: #fef3c7; border-color: #fbbf24; cursor: wait; }
        .tts-btn.active     { background: #ede9fe; border-color: #a5b4fc; color: #4338ca; }
        /* TTS processing — pattern tile spinner on the pause button */
        .tts-pause-btn.processing {
            position: relative;
            overflow: hidden;
            color: transparent !important;
            border-color: var(--c2, #6366f1);
            cursor: wait;
        }
        .tts-pause-btn.processing::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(145deg, var(--c1,#3730a3) 10%, var(--c2,#6366f1) 10.5% 19%, transparent 19.5% 80.5%, var(--c2,#6366f1) 81% 89.5%, var(--c3,#4f46e5) 90%),
                linear-gradient( 35deg, var(--c1,#3730a3) 10%, var(--c2,#6366f1) 10.5% 19%, transparent 19.5% 80.5%, var(--c2,#6366f1) 81% 89.5%, var(--c3,#4f46e5) 90%);
            background-size: 24px 16px;
            animation: ttsProcessingSpin 0.6s linear infinite;
            opacity: 0.85;
        }
        .tts-pause-btn.processing::after {
            content: '⏳';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: white;
        }
        @keyframes ttsProcessingSpin {
            from { background-position: 0 0, 0 0; }
            to   { background-position: 24px 0, 24px 0; }
        }
        @keyframes micPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
            50%      { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
        }
        /* TTS controls wrapper — single button when off, three when on */
        .tts-controls { display: flex; gap: 4px; flex-shrink: 0; }
        .tts-btn { min-width: 52px; }
        .tts-pause-btn, .tts-stop-btn { display: none; padding: 12px 11px; }
        .tts-controls.active .tts-btn { min-width: auto; }
        .tts-controls.active .tts-pause-btn,
        .tts-controls.active .tts-stop-btn { display: block; }
        @media (prefers-color-scheme: dark) {
            .mic-btn, .tts-btn, .tts-pause-btn, .tts-stop-btn { background: #1f2937; color: #d1d5db; border-color: #374151; }
            .mic-btn:hover, .tts-btn:hover,
            .tts-pause-btn:hover, .tts-stop-btn:hover { background: #2d3748; border-color: #818cf8; }
            .mic-btn.recording { background: #7f1d1d; border-color: #f87171; color: #fca5a5; }
            .tts-btn.active    { background: #2d3748; border-color: #818cf8; color: #a5b4fc; }
        }

        /* Time-of-day emoji animations */
        @keyframes moonFloat { 0%,100% { transform: translateY(0); }     50% { transform: translateY(-3px); } }
        @keyframes sunPulse  { 0%,100% { transform: scale(1); }          50% { transform: scale(1.18); } }
        @keyframes leafDrift { 0%,100% { transform: rotate(-6deg); }     50% { transform: rotate(6deg); } }
        @keyframes snowFloat { 0%,100% { transform: translateY(0) rotate(0deg); }  50% { transform: translateY(-3px) rotate(20deg); } }
        @keyframes flowerBob { 0%,100% { transform: scale(1) rotate(-3deg); }      50% { transform: scale(1.12) rotate(3deg); } }
        @keyframes glowPulse { 0%,100% { opacity: 0.88; }                50% { opacity: 1; } }

        html[data-timeofday="night"]     .time-emoji { animation: moonFloat 3.5s ease-in-out infinite; }
        html[data-timeofday="dawn"]      .time-emoji { animation: glowPulse 2s   ease-in-out infinite; }
        html[data-timeofday="morning"]   .time-emoji { animation: sunPulse  2.5s ease-in-out infinite; }
        html[data-timeofday="afternoon"] .time-emoji { animation: sunPulse  3s   ease-in-out infinite; }
        html[data-timeofday="dusk"]      .time-emoji { animation: glowPulse 1.8s ease-in-out infinite; }
        html[data-timeofday="evening"]   .time-emoji { animation: moonFloat 4s   ease-in-out infinite; }

        html[data-season="spring"] .season-emoji { animation: flowerBob 2.5s ease-in-out infinite; }
        html[data-season="autumn"] .season-emoji { animation: leafDrift  2s  ease-in-out infinite; }
        html[data-season="winter"] .season-emoji { animation: snowFloat  3s  ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>&#x1F99E; PicoClaw</h1>
            <div id="themeIndicator">
                <span class="season-emoji theme-emoji"></span>
                <span class="time-emoji theme-emoji"></span>
                <span id="themeLabel"></span>
            </div>
        </div>

        <div class="app-body">
            <div class="sidebar" id="sidebar">
                <button class="new-chat-btn" id="newChatBtn">&#xFF0B; New Chat</button>
                <div class="sidebar-label">Chats</div>
                <div class="chat-list" id="chatList"></div>
            </div>

            <div class="sidebar-resize" id="sidebarResize"></div>

            <div class="main-area">
                <div class="chat-title-bar" id="chatTitleBar"></div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <button id="micBtn" class="mic-btn" disabled title="Voice input (requires Whisper)">&#x1F3A4;</button>
                    <input type="text" id="messageInput" placeholder="Type a message&#x2026;" autocomplete="off" spellcheck="true">
                    <div class="tts-controls" id="ttsControls">
                        <button id="ttsBtn" class="tts-btn" title="Toggle text-to-speech">&#x1F507;</button>
                        <button id="ttsPauseBtn" class="tts-pause-btn" title="Play">&#x25B6;&#xFE0F;</button>
                        <button id="ttsStopBtn" class="tts-stop-btn" title="Stop speech">&#x23F9;&#xFE0F;</button>
                    </div>
                    <div style="position:relative;flex-shrink:0;">
                        <button id="ttsSettingsBtn" class="tts-settings-btn" title="TTS settings">&#x2699;&#xFE0F;</button>
                        <div id="ttsPopover" class="tts-popover">
                            <label for="ttsLangSelect">Language</label>
                            <select id="ttsLangSelect"></select>
                            <label for="ttsVoiceSelect">Voice</label>
                            <select id="ttsVoiceSelect"></select>
                            <div class="row"><label for="ttsRate">Speed</label><span class="val" id="ttsRateVal">1.0&times;</span></div>
                            <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1">
                            <div class="row"><label for="ttsVolume">Volume</label><span class="val" id="ttsVolumeVal">100%</span></div>
                            <input type="range" id="ttsVolume" min="0" max="1" step="0.05" value="1">
                            <div class="row"><label for="ttsPitch">Pitch</label><span class="val" id="ttsPitchVal">1.0</span></div>
                            <input type="range" id="ttsPitch" min="0.5" max="2" step="0.1" value="1">
                        </div>
                    </div>
                    <button id="sendButton">Send</button>
                </div>
                <div class="bottom-bar">
                    <div class="status-indicator">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Checking&#x2026;</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORE_KEY    = 'picoclaw_sessions_v2';
        const SIDEBAR_KEY  = 'picoclaw_sidebar_width';

        function loadStore()    { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } }
        function saveStore(s)   { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {} }
        function makeSession(n) { return { id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2), name: n, messages: [] }; }
        function defaultStore() { const s = makeSession('General'); return { sessions: [s], activeId: s.id }; }

        // Derive a chat title from the first user message (first line, max 42 chars)
        function titleFromMessage(text) {
            const line = text.split(/[\r\n]/)[0].trim();
            return line.length > 42 ? line.slice(0, 42).trimEnd() + '\u2026' : line;
        }

        class PicoClawApp {
            constructor() {
                this.store = loadStore() || defaultStore();
                this.isConnected = false;
                this.apiUrl = window.location.origin;

                this.el = {
                    messages:       document.getElementById('messages'),
                    messageInput:   document.getElementById('messageInput'),
                    sendButton:     document.getElementById('sendButton'),
                    statusDot:      document.getElementById('statusDot'),
                    statusText:     document.getElementById('statusText'),
                    chatList:       document.getElementById('chatList'),
                    newChatBtn:     document.getElementById('newChatBtn'),
                    chatTitleBar:   document.getElementById('chatTitleBar'),
                    sidebar:        document.getElementById('sidebar'),
                    resizeHandle:   document.getElementById('sidebarResize'),
                    micBtn:         document.getElementById('micBtn'),
                    ttsControls:    document.getElementById('ttsControls'),
                    ttsBtn:         document.getElementById('ttsBtn'),
                    ttsPauseBtn:    document.getElementById('ttsPauseBtn'),
                    ttsStopBtn:     document.getElementById('ttsStopBtn'),
                    ttsSettingsBtn: document.getElementById('ttsSettingsBtn'),
                    ttsPopover:     document.getElementById('ttsPopover'),
                    ttsLangSelect:  document.getElementById('ttsLangSelect'),
                    ttsVoiceSelect: document.getElementById('ttsVoiceSelect'),
                    ttsRate:        document.getElementById('ttsRate'),
                    ttsVolume:      document.getElementById('ttsVolume'),
                    ttsPitch:       document.getElementById('ttsPitch'),
                    ttsRateVal:     document.getElementById('ttsRateVal'),
                    ttsVolumeVal:   document.getElementById('ttsVolumeVal'),
                    ttsPitchVal:    document.getElementById('ttsPitchVal'),
                };

                this.el.sendButton.addEventListener('click',   () => this.sendMessage());
                this.el.messageInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMessage(); }
                });
                this.el.newChatBtn.addEventListener('click', () => this.newChat());
                this.el.micBtn.addEventListener('click', () => this.toggleRecording());
                this.el.ttsBtn.addEventListener('click',       () => this.toggleTts());
                this.el.ttsPauseBtn.addEventListener('click',   () => this.ttsPauseResume());
                this.el.ttsStopBtn.addEventListener('click',    () => this.ttsStop());
                this.el.ttsSettingsBtn.addEventListener('click', e => { e.stopPropagation(); this.el.ttsPopover.classList.toggle('open'); });
                document.addEventListener('click', () => this.el.ttsPopover.classList.remove('open'));
                this.el.ttsPopover.addEventListener('click', e => e.stopPropagation());

                // Load TTS prefs
                const ttsPrefs = JSON.parse(localStorage.getItem('picoclaw_tts') || '{}');
                this.ttsVoiceName = ttsPrefs.voice  || '';
                this.ttsLang      = ttsPrefs.lang   || '';
                this.el.ttsRate.value   = ttsPrefs.rate   ?? 1;
                this.el.ttsVolume.value = ttsPrefs.volume ?? 1;
                this.el.ttsPitch.value  = ttsPrefs.pitch  ?? 1;
                this._updateTtsLabels();

                this.el.ttsRate.addEventListener('input',   () => { this._updateTtsLabels(); this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });
                this.el.ttsVolume.addEventListener('input', () => { this._updateTtsLabels(); this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });
                this.el.ttsPitch.addEventListener('input',  () => { this._updateTtsLabels(); this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });
                this.el.ttsLangSelect.addEventListener('change', () => {
                    this.ttsLang = this.el.ttsLangSelect.value;
                    this.ttsVoiceName = '';
                    this._fillVoicesByLang();
                    this._saveTtsPrefs();
                    this._ttsRestartIfPlaying();
                });
                this.el.ttsVoiceSelect.addEventListener('change', () => { this.ttsVoiceName = this.el.ttsVoiceSelect.value; this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });

                // Friendly language name helper using Intl where available
                const langDisplay = (() => {
                    try { const dn = new Intl.DisplayNames(['en'], { type: 'language' }); return tag => dn.of(tag); }
                    catch { return tag => tag; }
                })();

                // Populate voice list (voices load async in most browsers)
                const fillVoices = () => {
                    const voices = speechSynthesis.getVoices();
                    if (!voices.length) return;

                    // Group by base language code (e.g. 'en' from 'en-US', 'en-GB')
                    // so all English voices appear under one "English" entry.
                    const langMap = new Map(); // base-code -> display name
                    voices.forEach(v => {
                        const base = v.lang.split('-')[0];
                        if (!langMap.has(base)) {
                            langMap.set(base, langDisplay(base) || base);
                        }
                    });
                    const langs = [...langMap.entries()].sort((a, b) => a[1].localeCompare(b[1]));

                    const savedBase = this.ttsLang || 'en';
                    this.el.ttsLangSelect.innerHTML =
                        langs.map(([base, name]) =>
                            `<option value="${base}" ${base === savedBase ? 'selected' : ''}>${name}</option>`
                        ).join('');
                    this.ttsLang = savedBase;

                    this._allVoices = voices;
                    this._fillVoicesByLang();
                };
                speechSynthesis.addEventListener('voiceschanged', fillVoices);
                fillVoices();

                this.ttsEnabled     = false;
                this.ttsSelectedEl  = null;
                this._ttsState      = 'idle'; // 'idle' | 'playing' | 'paused'
                this.mediaRecorder  = null;
                this.audioChunks    = [];
                this._audioCtx      = null;
                this._levelRaf      = null;

                this._initResize();
                this.checkCapabilities();
                this.renderSidebar();
                this.renderMessages();
                this.checkConnection();
            }

            //  Sidebar drag resize 
            _initResize() {
                const sidebar = this.el.sidebar;
                const handle  = this.el.resizeHandle;

                // Restore saved width
                const saved = parseInt(localStorage.getItem(SIDEBAR_KEY));
                if (saved && saved >= 130 && saved <= 480) sidebar.style.width = saved + 'px';

                handle.addEventListener('mousedown', e => {
                    e.preventDefault();
                    const startX = e.clientX;
                    const startW = sidebar.offsetWidth;
                    handle.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';

                    const onMove = ev => {
                        const w = Math.max(130, Math.min(480, startW + ev.clientX - startX));
                        sidebar.style.width = w + 'px';
                    };
                    const onUp = () => {
                        handle.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        localStorage.setItem(SIDEBAR_KEY, sidebar.offsetWidth);
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            }

            //  Session management 
            get active() {
                return this.store.sessions.find(s => s.id === this.store.activeId) || this.store.sessions[0];
            }

            switchTo(id) {
                this.store.activeId = id;
                saveStore(this.store);
                this.renderSidebar();
                this.renderMessages();
            }

            newChat() {
                const s = makeSession('New chat');
                this.store.sessions.push(s);
                this.store.activeId = s.id;
                saveStore(this.store);
                this.renderSidebar();
                this.renderMessages();
                // Focus input so user can just start typing
                this.el.messageInput.focus();
            }

            deleteSession(id) {
                if (this.store.sessions.length === 1) { alert("Can't delete the last chat."); return; }
                if (!confirm('Delete this chat and all its messages?')) return;
                this.store.sessions = this.store.sessions.filter(s => s.id !== id);
                if (this.store.activeId === id) this.store.activeId = this.store.sessions[0].id;
                saveStore(this.store);
                this.renderSidebar();
                this.renderMessages();
            }

            startRename(nameEl, id) {
                nameEl.contentEditable = 'true';
                nameEl.focus();
                const range = document.createRange();
                range.selectNodeContents(nameEl);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);

                const finish = () => {
                    nameEl.contentEditable = 'false';
                    const s = this.store.sessions.find(s => s.id === id);
                    if (s && nameEl.textContent.trim()) {
                        s.name = nameEl.textContent.trim();
                        saveStore(this.store);
                        this.el.chatTitleBar.textContent = s.name;
                    }
                    this.renderSidebar();
                };
                nameEl.addEventListener('blur', finish, { once: true });
                nameEl.addEventListener('keydown', e => {
                    if (e.key === 'Enter')  { e.preventDefault(); nameEl.blur(); }
                    if (e.key === 'Escape') { nameEl.contentEditable = 'false'; this.renderSidebar(); }
                }, { once: true });
            }

            //  Render 
            renderSidebar() {
                const list = this.el.chatList;
                list.innerHTML = '';
                this.store.sessions.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'chat-item' + (s.id === this.store.activeId ? ' active' : '');
                    item.dataset.id = s.id;
                    item.innerHTML =
                        '<span class="chat-item-icon">&#x1F4AC;</span>' +
                        '<span class="chat-item-name">' + this.escapeHtml(s.name) + '</span>' +
                        '<button class="chat-item-rename" title="Rename">&#x270F;</button>' +
                        '<button class="chat-item-delete" title="Delete">&#x2715;</button>';

                    item.addEventListener('click', e => {
                        if (e.target.closest('.chat-item-delete')) return;
                        if (e.target.closest('.chat-item-rename')) return;
                        if (e.target.closest('.chat-item-name')?.contentEditable === 'true') return;
                        this.switchTo(s.id);
                    });
                    item.querySelector('.chat-item-name').addEventListener('dblclick', e => {
                        e.stopPropagation();
                        this.startRename(e.currentTarget, s.id);
                    });
                    item.querySelector('.chat-item-rename').addEventListener('click', e => {
                        e.stopPropagation();
                        this.startRename(item.querySelector('.chat-item-name'), s.id);
                    });
                    item.querySelector('.chat-item-delete').addEventListener('click', e => {
                        e.stopPropagation();
                        this.deleteSession(s.id);
                    });
                    list.appendChild(item);
                });
                this.el.chatTitleBar.textContent = this.active?.name ?? '';
                this.el.chatTitleBar.onclick = () => {
                    if (!this.active) return;
                    const nameEl = list.querySelector('.chat-item[data-id="' + this.active.id + '"] .chat-item-name');
                    if (nameEl) this.startRename(nameEl, this.active.id);
                };
            }

            renderMessages() {
                const session = this.active;
                const box = this.el.messages;
                box.innerHTML = '';

                if (session.messages.length === 0) {
                    const w = document.createElement('div');
                    w.className = 'message system';
                    w.textContent = 'Start chatting \u2014 messages are saved per chat.';
                    box.appendChild(w);
                } else {
                    session.messages.forEach(m => this._appendMessage(m));
                }
                this.el.chatTitleBar.textContent = session.name;
                this.scrollToBottom();

                // Auto-select the last assistant message as TTS target
                this._ttsAutoSelect();
            }

            //  Connection 
            async checkConnection() {
                this.setStatus('connecting', 'Checking\u2026');
                try {
                    const res = await fetch(this.apiUrl + '/api/status');
                    if (res.ok) {
                        const data = await res.json();
                        if (data.gateway?.running) {
                            this.setStatus('connected', 'Connected');
                            this.isConnected = true;
                        } else {
                            this.setStatus('error', 'Gateway not running');
                            this.isConnected = false;
                        }
                    } else {
                        this.setStatus('error', 'API not responding');
                    }
                } catch {
                    this.setStatus('error', 'Cannot reach API');
                }
            }

            setStatus(cls, text) {
                this.el.statusDot.className = 'status-dot ' + cls;
                this.el.statusText.textContent = text;
            }

            //  Messaging 
            async sendMessage() {
                const text = this.el.messageInput.value.trim();
                if (!text) return;

                // Auto-name: if this is the first message and name is still a placeholder
                const isFirstMsg = this.active.messages.length === 0;
                const isAutoName = /^(New chat|General|Chat \d+)$/i.test(this.active.name);
                if (isFirstMsg && isAutoName) {
                    this.active.name = titleFromMessage(text);
                    saveStore(this.store);
                    this.renderSidebar();
                }

                this.addMessage('user', text);
                this.el.messageInput.value = '';
                this.el.sendButton.disabled = true;
                const typingId = this.showTyping();
                try {
                    let reply;
                    if (this.isConnected) {
                        reply = await this.sendToPicoClaw(text);
                    } else {
                        throw new Error('Gateway not connected — check the status indicator');
                    }
                    this.removeTyping(typingId);
                    this.addMessage('assistant', reply);
                } catch (err) {
                    this.removeTyping(typingId);
                    this.addMessage('system', 'Error: ' + err.message);
                } finally {
                    this.el.sendButton.disabled = false;
                    this.el.messageInput.focus();
                }
            }

            async sendToPicoClaw(message) {
                const res = await fetch(this.apiUrl + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, chat_id: this.active.id }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'API error ' + res.status);
                }
                const data = await res.json();
                return data.response || data.message || 'No response received';
            }

            addMessage(role, content) {
                const msg = { id: Date.now(), role, content, ts: new Date().toLocaleTimeString() };
                this.active.messages.push(msg);
                saveStore(this.store);
                this._appendMessage(msg);
                this.scrollToBottom();
                // Auto-select new assistant messages so ▶️ plays the latest reply
                if (role === 'assistant') {
                    const el = this.el.messages.querySelector('.message[data-msgid="' + msg.id + '"]');
                    if (el) this._ttsSelect(el, content);
                }
            }

            _appendMessage(msg) {
                const el = document.createElement('div');
                el.className = 'message ' + msg.role;
                el.dataset.msgid = String(msg.id);

                if (msg.role === 'user') {
                    el.innerHTML =
                        '<div class="message-meta">You \xB7 ' + msg.ts + '</div>'
                        + '<div class="msg-text">' + this.escapeHtml(msg.content) + '</div>';
                } else if (msg.role === 'assistant') {
                    el.innerHTML =
                        '<div class="message-meta">PicoClaw \xB7 ' + msg.ts + '</div>'
                        + '<div class="msg-text">' + this.escapeHtml(msg.content) + '</div>';
                } else {
                    el.textContent = msg.content;
                }

                // Click to select this bubble as the TTS target
                el.addEventListener('click', () => this._ttsSelect(el, msg.content));

                this.el.messages.appendChild(el);
            }

            showTyping() {
                const id = 'typing-' + Date.now();
                const el = document.createElement('div');
                el.id = id;
                el.className = 'message assistant';
                el.innerHTML =
                    '<div class="message-meta">PicoClaw</div>' +
                    '<div style="display:flex;gap:5px;align-items:center;">' +
                    '<div class="typing-dot" style="animation-delay:0s"></div>' +
                    '<div class="typing-dot" style="animation-delay:0.2s"></div>' +
                    '<div class="typing-dot" style="animation-delay:0.4s"></div>' +
                    '</div>';
                this.el.messages.appendChild(el);
                this.scrollToBottom();
                return id;
            }

            removeTyping(id) { document.getElementById(id)?.remove(); }

            clearChat() {
                if (!confirm('Clear all messages in this chat?')) return;
                this.active.messages = [];
                saveStore(this.store);
                this.renderMessages();
            }

            // ── Voice: capabilities check ──────────────────────────────────────
            async checkCapabilities() {
                try {
                    const res = await fetch(this.apiUrl + '/api/capabilities');
                    if (res.ok) {
                        const caps = await res.json();
                        if (caps.whisper) this.el.micBtn.disabled = false;
                    }
                } catch {}
            }

            // ── Voice: TTS toggle ──────────────────────────────────────────────
            toggleTts() {
                this.ttsEnabled = !this.ttsEnabled;
                this.el.ttsBtn.textContent = this.ttsEnabled ? '\uD83D\uDD0A' : '\uD83D\uDD07';
                this.el.ttsBtn.classList.toggle('active', this.ttsEnabled);
                this.el.ttsControls.classList.toggle('active', this.ttsEnabled);
                if (!this.ttsEnabled) {
                    speechSynthesis.cancel();
                    this._ttsSetIdle();
                    this._ttsSetReading(null);
                }
            }

            // Select a bubble as the current TTS target
            _ttsDeselect() {
                this.el.messages.querySelectorAll('.tts-selected').forEach(b => b.classList.remove('tts-selected'));
                this.ttsSelectedEl = null;
            }

            _ttsSelect(el, text) {
                this._ttsDeselect();
                el.classList.add('tts-selected');
                this.ttsLastText = text;
                this.ttsSelectedEl = el;
                // Only switch audio if already playing — never auto-start
                if (this._ttsState === 'playing') this._speak(text);
            }

            // Mark a bubble as actively reading (outline upgrade)
            _ttsSetReading(el) {
                this.el.messages.querySelectorAll('.tts-reading').forEach(b => b.classList.remove('tts-reading'));
                if (el) el.classList.add('tts-reading');
            }

            // Auto-select last assistant message
            _ttsAutoSelect() {
                const allMsgs = [...this.el.messages.querySelectorAll('.message.assistant')];
                const last = allMsgs[allMsgs.length - 1];
                if (!last) return;
                const text = last.querySelector('.msg-text')?.textContent || '';
                this._ttsDeselect();
                last.classList.add('tts-selected');
                this.ttsLastText   = text;
                this.ttsSelectedEl = last;
            }

            _ttsSetIdle() {
                this._ttsState = 'idle';
                this.el.ttsPauseBtn.classList.remove('processing');
                this.el.ttsPauseBtn.textContent = '\u25B6\uFE0F';
                this.el.ttsPauseBtn.title = 'Play';
                this.el.ttsPauseBtn.disabled = false;
            }

            _ttsSetPlaying() {
                this._ttsState = 'playing';
                this.el.ttsPauseBtn.classList.remove('processing');
                this.el.ttsPauseBtn.textContent = '\u23F8\uFE0F';
                this.el.ttsPauseBtn.title = 'Pause speech';
                this.el.ttsPauseBtn.disabled = false;
            }

            _ttsSetProcessing() {
                this.el.ttsPauseBtn.classList.add('processing');
                this.el.ttsPauseBtn.textContent = '';
                this.el.ttsPauseBtn.title = 'Processing…';
                this.el.ttsPauseBtn.disabled = true;
            }

            ttsPauseResume() {
                if (this._ttsState === 'playing') {
                    speechSynthesis.pause();
                    this._ttsState = 'paused';
                    this.el.ttsPauseBtn.textContent = '\u25B6\uFE0F';
                    this.el.ttsPauseBtn.title = 'Resume speech';
                } else if (this._ttsState === 'paused') {
                    speechSynthesis.resume();
                    this._ttsSetPlaying();
                } else {
                    // Idle — check for a live text selection first
                    const sel = window.getSelection();
                    const selText = sel && sel.toString().trim();
                    if (selText) {
                        const anchor = sel.anchorNode;
                        const bubble = (anchor
                            ? (anchor.nodeType === 1 ? anchor : anchor.parentElement)
                            : null)?.closest('.message');
                        if (bubble) {
                            this.el.messages.querySelectorAll('.tts-selected').forEach(b => b.classList.remove('tts-selected'));
                            bubble.classList.add('tts-selected');
                            this.ttsSelectedEl = bubble;
                        }
                        this.ttsLastText = selText;
                        this._speak(selText);
                    } else if (this.ttsLastText) {
                        this._speak(this.ttsLastText);
                    }
                }
            }

            // Restart with updated settings — only cancel if something is actually running.
            // The Web Speech API has no restart() or seek, so cancel() + speak() is the only way
            // to apply new settings mid-utterance.
            _ttsRestartIfPlaying() {
                if (this._ttsState === 'playing' || this._ttsState === 'paused') {
                    this._speak(this.ttsLastText);
                }
            }

            // Stop = cancel only if something is running, then reset to ▶️ ready to replay.
            // ttsLastText is preserved so ▶️ replays from the beginning.
            ttsStop() {
                if (this._ttsState !== 'idle') {
                    speechSynthesis.cancel();
                }
                this._ttsSetIdle();
                this._ttsSetReading(null);
            }

            // _speak: cancel() is only called when something is already playing/paused
            // (i.e. we're switching content or applying new settings).
            // When idle, speak() is called directly — no cancel() needed, no delay needed.
            _speak(text) {
                if (!text) return;
                this.ttsLastText = text;
                const readingEl = this.ttsSelectedEl || null;

                const doSpeak = () => {
                    const utt = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const match = voices.find(v => v.name === this.ttsVoiceName);
                    if (match) utt.voice = match;
                    utt.rate   = parseFloat(this.el.ttsRate.value);
                    utt.volume = parseFloat(this.el.ttsVolume.value);
                    utt.pitch  = parseFloat(this.el.ttsPitch.value);
                    utt.addEventListener('start', () => { this._ttsSetPlaying(); this._ttsSetReading(readingEl); });
                    utt.addEventListener('end',   () => { this._ttsSetIdle();   this._ttsSetReading(null); });
                    utt.addEventListener('error', () => { this._ttsSetIdle();   this._ttsSetReading(null); });
                    speechSynthesis.speak(utt);
                };

                if (this._ttsState !== 'idle') {
                    // Cancel the current utterance and wait for Chromium to process it
                    // before queuing the new one (cancel() is async in Chromium/Electron).
                    speechSynthesis.cancel();
                    this._ttsState = 'idle';
                    this._ttsSetProcessing();
                    setTimeout(doSpeak, 100);
                } else {
                    doSpeak();
                }
            }

            _updateTtsLabels() {
                this.el.ttsRateVal.textContent   = parseFloat(this.el.ttsRate.value).toFixed(1) + '\xD7';
                this.el.ttsVolumeVal.textContent = Math.round(this.el.ttsVolume.value * 100) + '%';
                this.el.ttsPitchVal.textContent  = parseFloat(this.el.ttsPitch.value).toFixed(1);
            }

            _saveTtsPrefs() {
                localStorage.setItem('picoclaw_tts', JSON.stringify({
                    voice:  this.ttsVoiceName,
                    lang:   this.ttsLang,
                    rate:   parseFloat(this.el.ttsRate.value),
                    volume: parseFloat(this.el.ttsVolume.value),
                    pitch:  parseFloat(this.el.ttsPitch.value),
                }));
            }

            _fillVoicesByLang() {
                // Filter by base language prefix (e.g. 'en' matches en-US, en-GB, en-AU...)
                const voices = (this._allVoices || []).filter(v => v.lang.split('-')[0] === this.ttsLang);
                if (!voices.length) return;
                this.el.ttsVoiceSelect.innerHTML = voices.map(v =>
                    `<option value="${v.name}" ${v.name === this.ttsVoiceName ? 'selected' : ''}>${v.name} (${v.lang})</option>`
                ).join('');
                // If saved voice not present in this language, default to first
                if (!voices.find(v => v.name === this.ttsVoiceName)) {
                    this.ttsVoiceName = voices[0].name;
                    this.el.ttsVoiceSelect.value = this.ttsVoiceName;
                }
            }

            // ── Voice: audio level visualisation ──────────────────────────────
            _startLevelMeter(stream) {
                try {
                    this._audioCtx = new AudioContext();
                    const src      = this._audioCtx.createMediaStreamSource(stream);
                    const analyser = this._audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    src.connect(analyser);
                    const buf = new Uint8Array(analyser.frequencyBinCount);
                    const input = this.el.messageInput;
                    input.classList.add('listening');
                    const tick = () => {
                        analyser.getByteFrequencyData(buf);
                        const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
                        const pct = Math.min(100, avg * 2.2);           // 0–100
                        const opacity = 0.06 + (pct / 100) * 0.55;     // 0.06–0.61
                        input.style.setProperty('--audio-level', opacity.toFixed(3));
                        input.style.setProperty('--audio-pct', pct.toFixed(1) + '%');
                        this._levelRaf = requestAnimationFrame(tick);
                    };
                    tick();
                } catch {}
            }

            _stopLevelMeter() {
                cancelAnimationFrame(this._levelRaf);
                this._levelRaf = null;
                if (this._audioCtx) { this._audioCtx.close(); this._audioCtx = null; }
                const input = this.el.messageInput;
                input.classList.remove('listening');
                input.style.removeProperty('--audio-level');
                input.style.removeProperty('--audio-pct');
            }

            // ── Voice: microphone recording ────────────────────────────────────
            async toggleRecording() {
                if (this.mediaRecorder?.state === 'recording') {
                    // Stop both MediaRecorder and live SpeechRecognition
                    this.mediaRecorder.stop();
                    if (this._recognition) { this._recognition.stop(); this._recognition = null; }
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.audioChunks = [];
                    this._startLevelMeter(stream);

                    // --- Live word-by-word display via Web Speech API ---
                    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRec) {
                        const rec = new SpeechRec();
                        rec.continuous    = true;
                        rec.interimResults = true;
                        rec.onresult = (event) => {
                            let text = '';
                            for (let i = 0; i < event.results.length; i++) {
                                text += event.results[i][0].transcript;
                            }
                            this.el.messageInput.value = text;
                        };
                        // If recognition ends by itself (e.g. silence timeout), clear handle
                        rec.onend = () => { this._recognition = null; };
                        rec.onerror = () => { this._recognition = null; };
                        try { rec.start(); this._recognition = rec; } catch (_) {}
                    }

                    // --- Full audio capture for accurate Whisper final transcript ---
                    // Prefer ogg/opus — whisper's ffmpeg handles it more reliably than webm
                    const mimeType = MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
                        ? 'audio/ogg;codecs=opus'
                        : MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                            ? 'audio/webm;codecs=opus'
                            : 'audio/webm';
                    this.mediaRecorder = new MediaRecorder(stream, { mimeType });
                    // timeslice=100ms ensures proper chunk headers are written throughout
                    this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                    this.mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        this._stopLevelMeter();
                        const interimText = this.el.messageInput.value; // keep live text visible while processing
                        this.el.micBtn.textContent = '\u23F3';
                        this.el.micBtn.classList.remove('recording');
                        this.el.micBtn.classList.add('processing');
                        this.el.micBtn.disabled = true;
                        this.el.messageInput.classList.add('transcribing');
                        if (!interimText) this.el.messageInput.placeholder = 'Transcribing…';
                        try {
                            const blob = new Blob(this.audioChunks, { type: mimeType });
                            const ext  = mimeType.includes('ogg') ? 'ogg' : 'webm';
                            const res  = await fetch(this.apiUrl + '/api/stt?ext=' + ext, {
                                method: 'POST',
                                headers: { 'Content-Type': mimeType },
                                body: blob,
                            });
                            const data = await res.json();
                            if (data.transcript) {
                                // Replace interim text with Whisper's accurate final transcript
                                this.el.messageInput.value = data.transcript;
                                this.el.messageInput.focus();
                            } else if (!interimText) {
                                this.addMessage('system', 'STT error: ' + (data.error || 'No transcript returned'));
                            }
                            // If whisper failed but interim text exists, keep what the user saw
                        } catch (err) {
                            if (!interimText) this.addMessage('system', 'Voice input failed: ' + err.message);
                        } finally {
                            this.el.micBtn.textContent = '\uD83C\uDFA4';
                            this.el.micBtn.classList.remove('processing');
                            this.el.micBtn.disabled = false;
                            this.el.messageInput.classList.remove('transcribing');
                            this.el.messageInput.placeholder = 'Type a message…';
                        }
                    };
                    this.mediaRecorder.start(100); // 100ms timeslice = proper chunked headers
                    this.el.micBtn.textContent = '\u23F9';
                    this.el.micBtn.classList.add('recording');
                } catch (err) {
                    this.addMessage('system', 'Microphone error: ' + err.message);
                }
            }


            scrollToBottom() { this.el.messages.scrollTop = this.el.messages.scrollHeight; }
            escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        }

        function applyTheme() {
            const now    = new Date();
            const month  = now.getMonth() + 1; // 1–12
            const hour   = now.getHours();

            let season, seasonEmoji;
            if      (month >= 3 && month <= 5)  { season = 'spring'; seasonEmoji = '\uD83C\uDF38'; } // 🌸
            else if (month >= 6 && month <= 8)  { season = 'summer'; seasonEmoji = '\uD83C\uDF0A'; } // 🌊
            else if (month >= 9 && month <= 11) { season = 'autumn'; seasonEmoji = '\uD83C\uDF42'; } // 🍂
            else                                { season = 'winter'; seasonEmoji = '\u2744\uFE0F';  } // ❄️

            let timeofday, timeEmoji;
            if      (hour <  6)  { timeofday = 'night';     timeEmoji = '\uD83C\uDF03'; } // 🌃
            else if (hour <  9)  { timeofday = 'dawn';      timeEmoji = '\uD83C\uDF05'; } // 🌅
            else if (hour < 17)  { timeofday = 'afternoon'; timeEmoji = '\u2600\uFE0F'; } // ☀️
            else if (hour < 20)  { timeofday = 'dusk';      timeEmoji = '\uD83C\uDF07'; } // 🌇
            else                 { timeofday = 'evening';   timeEmoji = '\uD83C\uDF03'; } // 🌃

            const mins    = String(now.getMinutes()).padStart(2, '0');
            const hh      = String(hour).padStart(2, '0');
            const days    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const dateStr = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
            const timeStr = dateStr + '  ' + hh + ':' + mins;

            const html = document.documentElement;
            html.dataset.season    = season;
            html.dataset.timeofday = timeofday;

            const seasonEl = document.querySelector('.season-emoji');
            const timeEl   = document.querySelector('.time-emoji');
            const labelEl  = document.getElementById('themeLabel');
            if (seasonEl) seasonEl.textContent = seasonEmoji;
            if (timeEl)   timeEl.textContent   = timeEmoji;
            if (labelEl)  labelEl.textContent  = timeStr;
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            setInterval(applyTheme, 60 * 1000); // re-evaluate every minute
            window.app = new PicoClawApp();
        });
    </script>
</body>
