            async saveOverview() {
                const textarea = document.getElementById('config-edit-textarea');
                if (!textarea) return;
                
                try {
                    const newConfig = JSON.parse(textarea.value);
                    
                    // Validate configuration before saving
                    const validation = this.validateConfiguration(newConfig);
                    
                    // Show errors and warnings
                    if (validation.errors.length > 0 || validation.warnings.length > 0) {
                        let message = '';
                        
                        if (validation.errors.length > 0) {
                            message += '&#x274C; ERRORS (must fix before saving):\n\n';
                            message += validation.errors.join('\n\n') + '\n\n';
                        }
                        
                        if (validation.warnings.length > 0) {
                            message += '&#x26A0;&#xFE0F; WARNINGS (review recommended):\n\n';
                            message += validation.warnings.join('\n\n') + '\n\n';
                        }
                        
                        if (validation.errors.length > 0) {
                            message += '\n\nPlease fix the errors in the JSON before saving.';
                            alert(message);
                            return;
                        } else {
                            message += '\n\nDo you want to save anyway?';
                            if (!confirm(message)) {
                                return;
                            }
                        }
                    }
                    
                    const response = await fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ config: newConfig })
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        alert('&#x2705; Configuration saved successfully!');
                        this.configEditMode = false;
                        await this.showConfig(); // Reload config
                        await this.updateCurrentModel(); // Update model display
                        
                        // Prompt to restart gateway
                        if (confirm('&#x267B;&#xFE0F; Gateway restart recommended for changes to take effect.\n\nRestart gateway now?')) {
                            await this.restartGateway();
                        }
                    } else {
                        alert('&#x274C; Failed to save: ' + result.error);
                    }
                } catch (error) {
                    alert('&#x274C; Invalid JSON: ' + error.message);
                }
            }
            
            
            validateConfiguration(config) {
                const warnings = [];
                const errors = [];
                
                // Check if default model exists in model_list
                if (config.agents?.defaults?.model_name) {
                    const modelName = config.agents.defaults.model_name;
                    const modelExists = config.model_list?.some(m => m.model_name === modelName);
                    if (!modelExists) {
                        errors.push(`? Default model "${modelName}" not found in model_list. Agent won't start!`);
                    } else {
                        // Check if the model has valid credentials
                        const model = config.model_list.find(m => m.model_name === modelName);
                        if (model?.auth_method !== 'oauth' && !model?.api_key) {
                            warnings.push(`?? Model "${modelName}" has no API key. Authentication will fail unless using OAuth.`);
                        }
                    }
                }
                
                // Check for multiple enabled channels on same port
                if (config.channels) {
                    const portMap = {};
                    for (const [channelName, channelConfig] of Object.entries(config.channels)) {
                        if (channelConfig.enabled && channelConfig.port) {
                            const port = channelConfig.port;
                            if (portMap[port]) {
                                errors.push(`? Port ${port} conflict: Both "${portMap[port]}" and "${channelName}" channels trying to use same port!`);
                            } else {
                                portMap[port] = channelName;
                            }
                        }
                    }
                }
                
                // Check exec tool security
                if (config.tools?.exec?.enable_deny_patterns === false) {
                    warnings.push(`?? Exec tool: Dangerous command blocking is DISABLED. Only disable in fully trusted environments!`);
                }
                
                // Check gateway host for Docker users
                if (config.gateway?.host === '127.0.0.1') {
                    warnings.push(`?? Gateway host is localhost (127.0.0.1). If using Docker, change to 0.0.0.0 for external access.`);
                }
                
                // Check for workspace restrictions
                if (config.agents?.defaults?.restrict_to_workspace === false) {
                    warnings.push(`?? Workspace restriction is DISABLED. Agent can access any file on system. Enable for production security!`);
                }
                
                // Check temperature range
                if (config.agents?.defaults?.temperature > 1.5) {
                    warnings.push(`?? Temperature is very high (${config.agents.defaults.temperature}). Expect highly random/creative outputs.`);
                }
                
                // Check max_tokens
                if (config.agents?.defaults?.max_tokens < 1000) {
                    warnings.push(`?? Max tokens is very low (${config.agents.defaults.max_tokens}). May truncate responses.`);
                }
                
                // Check MCP servers configuration
                if (config.tools?.mcp?.enabled && config.tools.mcp.servers) {
                    for (const [serverName, serverConfig] of Object.entries(config.tools.mcp.servers)) {
                        if (serverConfig.enabled) {
                            if (!serverConfig.type && !serverConfig.command && !serverConfig.url) {
                                warnings.push(`?? MCP server "${serverName}": No command or URL specified. Server won't start.`);
                            }
                            if (serverConfig.type === 'stdio' && !serverConfig.command) {
                                errors.push(`? MCP server "${serverName}": Type is "stdio" but no command specified!`);
                            }
                            if ((serverConfig.type === 'sse' || serverConfig.type === 'http') && !serverConfig.url) {
                                errors.push(`? MCP server "${serverName}": Type is "${serverConfig.type}" but no URL specified!`);
                            }
                        }
                    }
                }
                
                // Check web search tools - only one should be enabled typically
                if (config.tools?.web) {
                    const enabledSearchTools = [];
                    ['brave', 'duckduckgo', 'perplexity', 'searxng', 'tavily', 'glm_search'].forEach(tool => {
                        if (config.tools.web[tool]?.enabled) {
                            enabledSearchTools.push(tool);
                        }
                    });
                    if (enabledSearchTools.length > 2) {
                        warnings.push(`?? Multiple web search tools enabled (${enabledSearchTools.join(', ')}). Consider using only 1-2 for efficiency.`);
                    }
                    
                    // Check for API keys
                    ['brave', 'perplexity', 'tavily', 'glm_search'].forEach(tool => {
                        if (config.tools.web[tool]?.enabled && !config.tools.web[tool]?.api_key) {
                            errors.push(`? Web tool "${tool}" is enabled but has no API key!`);
                        }
                    });
                }
                
                // Check for deprecated providers section
                if (config.providers && Object.keys(config.providers).some(k => k !== '_comment')) {
                    warnings.push(`?? Using deprecated "providers" section. Migrate to "model_list" format for better flexibility.`);
                }
                
                // Check cron jobs
                if (config.cron?.jobs && Array.isArray(config.cron.jobs)) {
                    config.cron.jobs.forEach((job, idx) => {
                        if (job.enabled && !job.schedule) {
                            errors.push(`? Cron job "${job.name || 'Job ' + (idx + 1)}" is enabled but has no schedule!`);
                        }
                        if (job.enabled && !job.command) {
                            errors.push(`? Cron job "${job.name || 'Job ' + (idx + 1)}" is enabled but has no command!`);
                        }
                    });
                }
                
                return { errors, warnings };
            }
            
            async saveConfigSection(sectionId) {
                const form = document.getElementById('config-form-' + sectionId);
                if (!form) return;
                
                const formData = new FormData(form);
                const newConfig = JSON.parse(JSON.stringify(this.configRawData.config));
                
                // Collect checkboxes that are unchecked (FormData doesn't include them)
                const allInputs = form.querySelectorAll('input[type="checkbox"]');
                const checkboxStates = {};
                allInputs.forEach(input => {
                    checkboxStates[input.name] = input.checked;
                });
                
                // Update config based on form data
                for (const [name, value] of formData.entries()) {
                    this.setNestedValue(newConfig, name, value, form.querySelector(`[name="${name}"]`));
                }
                
                // Handle unchecked checkboxes
                for (const [name, checked] of Object.entries(checkboxStates)) {
                    if (!formData.has(name)) {
                        this.setNestedValue(newConfig, name, '', form.querySelector(`[name="${name}"]`), checked);
                    }
                }
                
                // Validate configuration before saving
                const validation = this.validateConfiguration(newConfig);
                
                // Show errors and warnings
                if (validation.errors.length > 0 || validation.warnings.length > 0) {
                    let message = '';
                    
                    if (validation.errors.length > 0) {
                        message += '&#x274C; ERRORS (must fix before saving):\n\n';
                        message += validation.errors.join('\n\n') + '\n\n';
                    }
                    
                    if (validation.warnings.length > 0) {
                        message += '&#x26A0;&#xFE0F; WARNINGS (review recommended):\n\n';
                        message += validation.warnings.join('\n\n') + '\n\n';
                    }
                    
                    if (validation.errors.length > 0) {
                        message += '\n\nPlease fix the errors before saving.';
                        alert(message);
                        return;
                    } else {
                        message += '\n\nDo you want to save anyway?';
                        if (!confirm(message)) {
                            return;
                        }
                    }
                }
                
                try {
                    const response = await fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ config: newConfig })
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        alert('&#x2705; Configuration saved successfully!');
                        await this.showConfig(); // Reload config
                        await this.updateCurrentModel(); // Update model display
                        
                        // Prompt to restart gateway
                        if (confirm('&#x267B;&#xFE0F; Gateway restart recommended for changes to take effect.\n\nRestart gateway now?')) {
                            await this.restartGateway();
                        }
                    } else {
                        alert('&#x274C; Failed to save: ' + result.error);
                    }
                } catch (error) {
                    alert('&#x274C; Failed to save: ' + error.message);
                }
            }
            
            setNestedValue(obj, path, value, input, checkboxValue) {
                // Parse path like "agents.defaults.max_tokens" or "model_list.[0].api_key"
                const parts = path.split('.').filter(p => p);
                let current = obj;
                
                for (let i = 0; i < parts.length - 1; i++) {
                    const part = parts[i];
                    
                    // Handle array notation [0]
                    if (part.startsWith('[') && part.endsWith(']')) {
                        const index = parseInt(part.slice(1, -1), 10);
                        if (!Array.isArray(current)) current = [];
                        if (!current[index]) current[index] = {};
                        current = current[index];
                    } else {
                        if (!current[part]) current[part] = {};
                        current = current[part];
                    }
                }
                
                const lastKey = parts[parts.length - 1];
                
                // Determine the correct value type
                if (input && input.type === 'checkbox') {
                    current[lastKey] = checkboxValue !== undefined ? checkboxValue : input.checked;
                } else if (input && input.type === 'number') {
                    const numValue = parseFloat(value);
                    current[lastKey] = isNaN(numValue) ? 0 : numValue;
                } else if (input && input.type === 'password') {
                    // Only update if not empty (allows keeping existing value)
                    if (value && value.trim()) {
                        current[lastKey] = value;
                    }
                } else if (this.getConfigSchema()[parts[0]]?.[lastKey]?.type === 'array' || 
                           this.getConfigSchema()[parts[0]]?._common?.[lastKey]?.type === 'array') {
                    // Handle array fields (comma-separated values)
                    current[lastKey] = value ? value.split(',').map(v => v.trim()).filter(v => v) : [];
                } else {
                    current[lastKey] = value;
                }
            }
            
            hideConfigModal() {
                this.el.configModal.classList.remove('show');
                // Restore focus to message input to prevent blocking
                setTimeout(() => {
                    if (this.el.messageInput) {
                        this.el.messageInput.focus();
                    }
                }, 100);
            }

            toggleMatrixTheme() {
                const modalContent = document.querySelector('.config-modal-content');
                const toggleBtn = document.getElementById('matrixToggle');
                
                if (modalContent.classList.contains('matrix-theme')) {
                    modalContent.classList.remove('matrix-theme');
                    toggleBtn.textContent = 'MATRIX';
                    localStorage.setItem('picoclaw-config-theme', 'normal');
                } else {
                    modalContent.classList.add('matrix-theme');
                    toggleBtn.textContent = 'NORMAL';
                    localStorage.setItem('picoclaw-config-theme', 'matrix');
                }
            }

            showHelp() {
                const helpText = `PicoClaw Web Interface Help\\n\\n` +
                    `Features:\\n` +
                    `&#x2022; Voice input: Click mic button (requires Whisper)\\n` +
                    `&#x2022; Text-to-speech: Click speaker button for AI responses\\n` +
                    `&#x2022; Multiple sessions: Create new chats from sidebar\\n` +
                    `&#x2022; Connection status: Check gateway status in bottom-right\\n\\n` +
                    `Keyboard Shortcuts:\\n` +
                    `&#x2022; Enter: Send message\\n` +
                    `&#x2022; Shift+Enter: New line\\n\\n` +
                    `Documentation: Check README.md in the project root`;
                alert(helpText);
            }

            //  Messaging 
            async sendMessage() {
                const text = this.el.messageInput.value.trim();
                if (!text) return;

                // Auto-name: if this is the first message and name is still a placeholder
                const isFirstMsg = this.active.messages.length === 0;
                const isAutoName = /^(New chat|General|Chat \d+)$/i.test(this.active.name);
                if (isFirstMsg && isAutoName) {
                    this.active.name = titleFromMessage(text);
                    saveStore(this.store);
                    this.renderSidebar();
                }

                this.addMessage('user', text);
                this.el.messageInput.value = '';
                this.el.sendButton.disabled = true;
                const typingId = this.showTyping();
                try {
                    let reply;
                    if (this.isConnected) {
                        reply = await this.sendToPicoClaw(text);
                    } else {
                        throw new Error('Gateway not connected &#x2013; check the status indicator');
                    }
                    this.removeTyping(typingId);
                    this.addMessage('assistant', reply);
                } catch (err) {
                    this.removeTyping(typingId);
                    this.addMessage('system', 'Error: ' + err.message);
                } finally {
                    this.el.sendButton.disabled = false;
                    this.el.messageInput.focus();
                }
            }

            async sendToPicoClaw(message) {
                const res = await fetch(this.apiUrl + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, chat_id: this.active.id }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'API error ' + res.status);
                }
                const data = await res.json();
                return data.response || data.message || 'No response received';
            }

            addMessage(role, content) {
                const msg = { id: Date.now(), role, content, ts: new Date().toLocaleTimeString() };
                this.active.messages.push(msg);
                saveStore(this.store);
                this._appendMessage(msg);
                this.scrollToBottom();
                // Auto-select new assistant messages so &#x1F50A; plays the latest reply
                if (role === 'assistant') {
                    const el = this.el.messages.querySelector('.message[data-msgid="' + msg.id + '"]');
                    if (el) this._ttsSelect(el, content);
                }
            }

            _appendMessage(msg) {
                const el = document.createElement('div');
                el.className = 'message ' + msg.role;
                el.dataset.msgid = String(msg.id);

                if (msg.role === 'user') {
                    el.innerHTML =
                        '<div class="message-meta">You \xB7 ' + msg.ts + '</div>'
                        + '<div class="msg-text">' + this.escapeHtml(msg.content) + '</div>';
                } else if (msg.role === 'assistant') {
                    el.innerHTML =
                        '<div class="message-meta">PicoClaw \xB7 ' + msg.ts + '</div>'
                        + '<div class="msg-text">' + this.escapeHtml(msg.content) + '</div>';
                } else {
                    el.textContent = msg.content;
                }

                // Click to select this bubble as the TTS target
                el.addEventListener('click', () => this._ttsSelect(el, msg.content));

                this.el.messages.appendChild(el);
            }

            showTyping() {
                const id = 'typing-' + Date.now();
                const el = document.createElement('div');
                el.id = id;
                el.className = 'message assistant';
                el.innerHTML =
                    '<div class="message-meta">PicoClaw</div>' +
                    '<div style="display:flex;gap:5px;align-items:center;">' +
                    '<div class="typing-dot" style="animation-delay:0s"></div>' +
                    '<div class="typing-dot" style="animation-delay:0.2s"></div>' +
                    '<div class="typing-dot" style="animation-delay:0.4s"></div>' +
                    '</div>';
                this.el.messages.appendChild(el);
                this.scrollToBottom();
                return id;
            }

            removeTyping(id) { document.getElementById(id)?.remove(); }

            clearChat() {
                if (!confirm('Clear all messages in this chat?')) return;
                this.active.messages = [];
                saveStore(this.store);
                this.renderMessages();
            }

            // -- Voice: capabilities check --------------------------------------
            async checkCapabilities() {
                try {
                    const res = await fetch(this.apiUrl + '/api/capabilities');
                    if (res.ok) {
                        const caps = await res.json();
                        if (caps.whisper) this.el.micBtn.disabled = false;
                    }
                } catch {}
            }

            // -- Voice: TTS toggle ----------------------------------------------
            toggleTts() {
                this.ttsEnabled = !this.ttsEnabled;
                this.el.ttsBtn.textContent = this.ttsEnabled ? '\uD83D\uDD0A' : '\uD83D\uDD07';
                this.el.ttsBtn.classList.toggle('active', this.ttsEnabled);
                this.el.ttsControls.classList.toggle('active', this.ttsEnabled);
                if (!this.ttsEnabled) {
                    speechSynthesis.cancel();
                    this._ttsSetIdle();
                    this._ttsSetReading(null);
                }
            }

            // Select a bubble as the current TTS target
            _ttsDeselect() {
                this.el.messages.querySelectorAll('.tts-selected').forEach(b => b.classList.remove('tts-selected'));
                this.ttsSelectedEl = null;
            }

            _ttsSelect(el, text) {
                this._ttsDeselect();
                el.classList.add('tts-selected');
                this.ttsLastText = text;
                this.ttsSelectedEl = el;
                // Only switch audio if already playing &#x2013; never auto-start
                if (this._ttsState === 'playing') this._speak(text);
            }

            // Mark a bubble as actively reading (outline upgrade)
            _ttsSetReading(el) {
                this.el.messages.querySelectorAll('.tts-reading').forEach(b => b.classList.remove('tts-reading'));
                if (el) el.classList.add('tts-reading');
            }

            // Auto-select last assistant message
            _ttsAutoSelect() {
                const allMsgs = [...this.el.messages.querySelectorAll('.message.assistant')];
                const last = allMsgs[allMsgs.length - 1];
                if (!last) return;
                const text = last.querySelector('.msg-text')?.textContent || '';
                this._ttsDeselect();
                last.classList.add('tts-selected');
                this.ttsLastText   = text;
                this.ttsSelectedEl = last;
            }

            _ttsSetIdle() {
                this._ttsState = 'idle';
                this.el.ttsPauseBtn.classList.remove('processing');
                this.el.ttsPauseBtn.textContent = '\u25B6\uFE0F';
                this.el.ttsPauseBtn.title = 'Play';
                this.el.ttsPauseBtn.disabled = false;
            }

            _ttsSetPlaying() {
                this._ttsState = 'playing';
                this.el.ttsPauseBtn.classList.remove('processing');
                this.el.ttsPauseBtn.textContent = '\u23F8\uFE0F';
                this.el.ttsPauseBtn.title = 'Pause speech';
                this.el.ttsPauseBtn.disabled = false;
            }

            _ttsSetProcessing() {
                this.el.ttsPauseBtn.classList.add('processing');
                this.el.ttsPauseBtn.textContent = '';
                this.el.ttsPauseBtn.title = 'Processing&#x2026;';
                this.el.ttsPauseBtn.disabled = true;
            }

            ttsPauseResume() {
                if (this._ttsState === 'playing') {
                    speechSynthesis.pause();
                    this._ttsState = 'paused';
                    this.el.ttsPauseBtn.textContent = '\u25B6\uFE0F';
                    this.el.ttsPauseBtn.title = 'Resume speech';
                } else if (this._ttsState === 'paused') {
                    speechSynthesis.resume();
                    this._ttsSetPlaying();
                } else {
                    // Idle &#x2013; check for a live text selection first
                    const sel = window.getSelection();
                    const selText = sel && sel.toString().trim();
                    if (selText) {
                        const anchor = sel.anchorNode;
                        const bubble = (anchor
                            ? (anchor.nodeType === 1 ? anchor : anchor.parentElement)
                            : null)?.closest('.message');
                        if (bubble) {
                            this.el.messages.querySelectorAll('.tts-selected').forEach(b => b.classList.remove('tts-selected'));
                            bubble.classList.add('tts-selected');
                            this.ttsSelectedEl = bubble;
                        }
                        this.ttsLastText = selText;
                        this._speak(selText);
                    } else if (this.ttsLastText) {
                        this._speak(this.ttsLastText);
                    }
                }
            }

            // Restart with updated settings &#x2013; only cancel if something is actually running.
            // The Web Speech API has no restart() or seek, so cancel() + speak() is the only way
            // to apply new settings mid-utterance.
            _ttsRestartIfPlaying() {
                if (this._ttsState === 'playing' || this._ttsState === 'paused') {
                    this._speak(this.ttsLastText);
                }
            }

            // Stop = cancel only if something is running, then reset to ?? ready to replay.
            // ttsLastText is preserved so ?? replays from the beginning.
            ttsStop() {
                if (this._ttsState !== 'idle') {
                    speechSynthesis.cancel();
                }
                this._ttsSetIdle();
                this._ttsSetReading(null);
            }

            // _speak: cancel() is only called when something is already playing/paused
            // (i.e. we're switching content or applying new settings).
            // When idle, speak() is called directly &#x2013; no cancel() needed, no delay needed.
            _speak(text) {
                if (!text) return;
                this.ttsLastText = text;
                const readingEl = this.ttsSelectedEl || null;

                const doSpeak = () => {
                    const utt = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const match = voices.find(v => v.name === this.ttsVoiceName);
                    if (match) utt.voice = match;
                    utt.rate   = parseFloat(this.el.ttsRate.value);
                    utt.volume = parseFloat(this.el.ttsVolume.value);
                    utt.pitch  = parseFloat(this.el.ttsPitch.value);
                    utt.addEventListener('start', () => { this._ttsSetPlaying(); this._ttsSetReading(readingEl); });
                    utt.addEventListener('end',   () => { this._ttsSetIdle();   this._ttsSetReading(null); });
                    utt.addEventListener('error', () => { this._ttsSetIdle();   this._ttsSetReading(null); });
                    speechSynthesis.speak(utt);
                };

                if (this._ttsState !== 'idle') {
                    // Cancel the current utterance and wait for Chromium to process it
                    // before queuing the new one (cancel() is async in Chromium/Electron).
                    speechSynthesis.cancel();
                    this._ttsState = 'idle';
                    this._ttsSetProcessing();
                    setTimeout(doSpeak, 100);
                } else {
                    doSpeak();
                }
            }

            _updateTtsLabels() {
                this.el.ttsRateVal.textContent   = parseFloat(this.el.ttsRate.value).toFixed(1) + '\xD7';
                this.el.ttsVolumeVal.textContent = Math.round(this.el.ttsVolume.value * 100) + '%';
                this.el.ttsPitchVal.textContent  = parseFloat(this.el.ttsPitch.value).toFixed(1);
            }

            _saveTtsPrefs() {
                localStorage.setItem('picoclaw_tts', JSON.stringify({
                    engine: this.ttsEngine,
                    voice:  this.ttsVoiceName,
                    lang:   this.ttsLang,
                    rate:   parseFloat(this.el.ttsRate.value),
                    volume: parseFloat(this.el.ttsVolume.value),
                    pitch:  parseFloat(this.el.ttsPitch.value),
                    edgeVoice: this.el.edgeTtsVoice.value,
                    edgeRate: parseInt(this.el.edgeTtsRate.value),
                    elevenlabsVoice: this.el.elevenlabsTtsVoice.value
                }));
            }

            _updateTtsEngineOptions() {
                // Show/hide options based on selected engine
                const isBrowser = this.ttsEngine === 'browser';
                const isEdge = this.ttsEngine === 'edge-tts';
                const isElevenlabs = this.ttsEngine === 'elevenlabs';

                console.log('Switching TTS engine to:', this.ttsEngine);
                this.el.ttsEngineBrowserOptions.style.display = isBrowser ? 'block' : 'none';
                this.el.ttsEngineEdgeOptions.style.display = isEdge ? 'block' : 'none';
                this.el.ttsEngineElevenlabsOptions.style.display = isElevenlabs ? 'block' : 'none';
                
                // If switching to browser mode, ensure voices are loaded
                if (isBrowser && (!this._allVoices || this._allVoices.length === 0)) {
                    console.log('Browser mode selected but no voices loaded, retrying...');
                    const voices = speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        this._allVoices = voices;
                        this._fillVoicesByLang();
                    }
                }
            }

            _fillVoicesByLang() {
                // Filter by base language prefix (e.g. 'en' matches en-US, en-GB, en-AU...)
                const voices = (this._allVoices || []).filter(v => v.lang.split('-')[0] === this.ttsLang);
                console.log(`Filling voices for language '${this.ttsLang}':`, voices.length, 'voices found');
                if (!voices.length) {
                    console.warn(`No voices found for language '${this.ttsLang}'`);
                    return;
                }
                this.el.ttsVoiceSelect.innerHTML = voices.map(v =>
                    `<option value="${v.name}" ${v.name === this.ttsVoiceName ? 'selected' : ''}>${v.name} (${v.lang})</option>`
                ).join('');
                // If saved voice not present in this language, default to first
                if (!voices.find(v => v.name === this.ttsVoiceName)) {
                    this.ttsVoiceName = voices[0].name;
                    this.el.ttsVoiceSelect.value = this.ttsVoiceName;
                    console.log('Selected default voice:', this.ttsVoiceName);
                }
            }

            // -- Voice: audio level visualisation ------------------------------
            _startLevelMeter(stream) {
                try {
                    this._audioCtx = new AudioContext();
                    const src      = this._audioCtx.createMediaStreamSource(stream);
                    const analyser = this._audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    src.connect(analyser);
                    const buf = new Uint8Array(analyser.frequencyBinCount);
                    const input = this.el.messageInput;
                    input.classList.add('listening');
                    const tick = () => {
                        analyser.getByteFrequencyData(buf);
                        const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
                        const pct = Math.min(100, avg * 2.2);           // 0&#x2013;100
                        const opacity = 0.06 + (pct / 100) * 0.55;     // 0.06&#x2013;0.61
                        input.style.setProperty('--audio-level', opacity.toFixed(3));
                        input.style.setProperty('--audio-pct', pct.toFixed(1) + '%');
                        this._levelRaf = requestAnimationFrame(tick);
                    };
                    tick();
                } catch {}
            }

            _stopLevelMeter() {
                cancelAnimationFrame(this._levelRaf);
                this._levelRaf = null;
                if (this._audioCtx) { this._audioCtx.close(); this._audioCtx = null; }
                const input = this.el.messageInput;
                input.classList.remove('listening');
                input.style.removeProperty('--audio-level');
                input.style.removeProperty('--audio-pct');
            }

            // -- Voice: microphone recording ------------------------------------
            async toggleRecording() {
                if (this.mediaRecorder?.state === 'recording') {
                    // Stop both MediaRecorder and live SpeechRecognition
                    this.mediaRecorder.stop();
                    if (this._recognition) { this._recognition.stop(); this._recognition = null; }
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.audioChunks = [];
                    this._startLevelMeter(stream);

                    // --- Live word-by-word display via Web Speech API ---
                    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRec) {
                        const rec = new SpeechRec();
                        rec.continuous    = true;
                        rec.interimResults = true;
                        rec.onresult = (event) => {
                            let text = '';
                            for (let i = 0; i < event.results.length; i++) {
                                text += event.results[i][0].transcript;
                            }
                            this.el.messageInput.value = text;
                        };
                        // If recognition ends by itself (e.g. silence timeout), clear handle
                        rec.onend = () => { this._recognition = null; };
                        rec.onerror = () => { this._recognition = null; };
                        try { rec.start(); this._recognition = rec; } catch (_) {}
                    }

                    // --- Full audio capture for accurate Whisper final transcript ---
                    // Prefer ogg/opus &#x2013; whisper's ffmpeg handles it more reliably than webm
                    const mimeType = MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
                        ? 'audio/ogg;codecs=opus'
                        : MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                            ? 'audio/webm;codecs=opus'
                            : 'audio/webm';
                    this.mediaRecorder = new MediaRecorder(stream, { mimeType });
                    // timeslice=100ms ensures proper chunk headers are written throughout
                    this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                    this.mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        this._stopLevelMeter();
                        const interimText = this.el.messageInput.value; // keep live text visible while processing
                        this.el.micBtn.textContent = '\u23F3';
                        this.el.micBtn.classList.remove('recording');
                        this.el.micBtn.classList.add('processing');
                        this.el.micBtn.disabled = true;
                        this.el.messageInput.classList.add('transcribing');
                        if (!interimText) this.el.messageInput.placeholder = 'Transcribing&#x2026;';
                        try {
                            const blob = new Blob(this.audioChunks, { type: mimeType });
                            const ext  = mimeType.includes('ogg') ? 'ogg' : 'webm';
                            const res  = await fetch(this.apiUrl + '/api/stt?ext=' + ext, {
                                method: 'POST',
                                headers: { 'Content-Type': mimeType },
                                body: blob,
                            });
                            const data = await res.json();
                            if (data.transcript) {
                                // Replace interim text with Whisper's accurate final transcript
                                this.el.messageInput.value = data.transcript;
                                this.el.messageInput.focus();
                            } else if (!interimText) {
                                this.addMessage('system', 'STT error: ' + (data.error || 'No transcript returned'));
                            }
                            // If whisper failed but interim text exists, keep what the user saw
                        } catch (err) {
                            if (!interimText) this.addMessage('system', 'Voice input failed: ' + err.message);
                        } finally {
                            this.el.micBtn.textContent = '\uD83C\uDFA4';
                            this.el.micBtn.classList.remove('processing');
                            this.el.micBtn.disabled = false;
                            this.el.messageInput.classList.remove('transcribing');
                            this.el.messageInput.placeholder = 'Type a message&#x2026;';
                        }
                    };
                    this.mediaRecorder.start(100); // 100ms timeslice = proper chunked headers
                    this.el.micBtn.textContent = '\u23F9';
                    this.el.micBtn.classList.add('recording');
                } catch (err) {
                    this.addMessage('system', 'Microphone error: ' + err.message);
                }
            }


            scrollToBottom() { this.el.messages.scrollTop = this.el.messages.scrollHeight; }
            escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        }

        function applyTheme() {
            const now    = new Date();
            const month  = now.getMonth() + 1; // 1&#x2013;12
            const hour   = now.getHours();

            let season, seasonEmoji;
            if      (month >= 3 && month <= 5)  { season = 'spring'; seasonEmoji = '\uD83C\uDF38'; } // ??
            else if (month >= 6 && month <= 8)  { season = 'summer'; seasonEmoji = '\uD83C\uDF0A'; } // ??
            else if (month >= 9 && month <= 11) { season = 'autumn'; seasonEmoji = '\uD83C\uDF42'; } // ??
            else                                { season = 'winter'; seasonEmoji = '\u2744\uFE0F';  } // ??

            let timeofday, timeEmoji;
            if      (hour <  6)  { timeofday = 'night';     timeEmoji = '\uD83C\uDF03'; } // ??
            else if (hour <  9)  { timeofday = 'dawn';      timeEmoji = '\uD83C\uDF05'; } // ??
            else if (hour < 17)  { timeofday = 'afternoon'; timeEmoji = '\u2600\uFE0F'; } // ??
            else if (hour < 20)  { timeofday = 'dusk';      timeEmoji = '\uD83C\uDF07'; } // ??
            else                 { timeofday = 'evening';   timeEmoji = '\uD83C\uDF03'; } // ??

            const mins    = String(now.getMinutes()).padStart(2, '0');
            const hh      = String(hour).padStart(2, '0');
            const days    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const dateStr = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
            const timeStr = dateStr + '  ' + hh + ':' + mins;

            const html = document.documentElement;
            html.dataset.season    = season;
            html.dataset.timeofday = timeofday;

            const seasonEl = document.querySelector('.season-emoji');
            const timeEl   = document.querySelector('.time-emoji');
            const labelEl  = document.getElementById('themeLabel');
            if (seasonEl) seasonEl.textContent = seasonEmoji;
            if (timeEl)   timeEl.textContent   = timeEmoji;
            if (labelEl)  labelEl.textContent  = timeStr;
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            setInterval(applyTheme, 60 * 1000); // re-evaluate every minute
            window.app = new PicoClawApp();
        });
    </script>
