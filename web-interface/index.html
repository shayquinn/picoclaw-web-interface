<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline';
                   style-src 'self' 'unsafe-inline';
                   connect-src 'self';
                   media-src 'self' blob:;
                   img-src 'self' data:;">
    <title>PicoClaw</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>&#x1F99E; PicoClaw</h1>
            <div class="header-controls">
                <div id="currentModel" class="model-badge" title="Current AI Model" style="display: none;">
                    <span>&#x1F916;</span>
                    <span id="modelName">Loading...</span>
                </div>
                <div id="themeIndicator">
                    <span class="season-emoji theme-emoji"></span>
                    <span class="time-emoji theme-emoji"></span>
                    <span id="themeLabel"></span>
                </div>
            </div>
        </div>

        <div class="app-body">
            <div class="sidebar" id="sidebar">
                <button class="new-chat-btn" id="newChatBtn">&#xFF0B; New Chat</button>
                <div class="sidebar-label">Chats</div>
                <div class="chat-list" id="chatList"></div>
            </div>

            <div class="sidebar-resize" id="sidebarResize"></div>

            <div class="main-area">
                <div class="chat-title-bar">
                    <div class="chat-title-text" id="chatTitleBar"></div>
                    <div class="title-bar-controls">
                        <button id="configBtn" class="title-bar-btn" title="Configuration">&#x2699;&#xFE0F; Config</button>
                        <button id="helpBtn" class="title-bar-btn" title="Help">&#x2753; Help</button>
                    </div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <button id="micBtn" class="mic-btn" disabled title="Voice input (requires Whisper)">&#x1F3A4;</button>
                    <input type="text" id="messageInput" placeholder="Type a message&#x2026;" autocomplete="off" spellcheck="true">
                    <div class="tts-controls" id="ttsControls">
                        <button id="ttsBtn" class="tts-btn" title="Toggle text-to-speech">&#x1F507;</button>
                        <button id="ttsPauseBtn" class="tts-pause-btn" title="Play">&#x25B6;&#xFE0F;</button>
                        <button id="ttsStopBtn" class="tts-stop-btn" title="Stop speech">&#x23F9;&#xFE0F;</button>
                    </div>
                    <div style="position:relative;flex-shrink:0;">
                        <button id="ttsSettingsBtn" class="tts-settings-btn" title="TTS settings">&#x2699;&#xFE0F;</button>
                        <div id="ttsPopover" class="tts-popover">
                            <label for="ttsEngineSelect">TTS Engine</label>
                            <select id="ttsEngineSelect">
                                <option value="browser">Browser (Built-in voices)</option>
                                <option value="edge-tts">Edge-TTS (Microsoft) &#x2728;</option>
                                <option value="elevenlabs">ElevenLabs &#x1F4B0;</option>
                            </select>
                            <div id="ttsEngineBrowserOptions">
                                <label for="ttsLangSelect">Language</label>
                                <select id="ttsLangSelect"></select>
                                <label for="ttsVoiceSelect">Voice</label>
                                <select id="ttsVoiceSelect"></select>
                                <div class="row"><label for="ttsRate">Speed</label><span class="val" id="ttsRateVal">1.0&times;</span></div>
                                <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1">
                                <div class="row"><label for="ttsVolume">Volume</label><span class="val" id="ttsVolumeVal">100%</span></div>
                                <input type="range" id="ttsVolume" min="0" max="1" step="0.05" value="1">
                                <div class="row"><label for="ttsPitch">Pitch</label><span class="val" id="ttsPitchVal">1.0</span></div>
                                <input type="range" id="ttsPitch" min="0.5" max="2" step="0.1" value="1">
                            </div>
                            <div id="ttsEngineEdgeOptions" style="display:none;">
                                <label for="edgeTtsVoice">Voice</label>
                                <select id="edgeTtsVoice">
                                    <option value="en-US-MichelleNeural">en-US-MichelleNeural (Female)</option>
                                    <option value="en-US-GuyNeural">en-US-GuyNeural (Male)</option>
                                    <option value="en-US-AriaNeural">en-US-AriaNeural (Female)</option>
                                    <option value="en-US-DavisNeural">en-US-DavisNeural (Male)</option>
                                    <option value="en-GB-SoniaNeural">en-GB-SoniaNeural (British Female)</option>
                                    <option value="en-GB-RyanNeural">en-GB-RyanNeural (British Male)</option>
                                </select>
                                <div class="row"><label for="edgeTtsRate">Speed</label><span class="val" id="edgeTtsRateVal">+0%</span></div>
                                <input type="range" id="edgeTtsRate" min="-50" max="50" step="5" value="0">
                                <div style="font-size:0.85em;color:#666;margin-top:8px;">&#x26A0;&#xFE0F; Requires edge-tts skill installed & configured</div>
                            </div>
                            <div id="ttsEngineElevenlabsOptions" style="display:none;">
                                <label for="elevenlabsTtsVoice">Voice ID</label>
                                <input type="text" id="elevenlabsTtsVoice" placeholder="Enter ElevenLabs voice ID" style="width:100%;padding:4px;border:1px solid #ccc;border-radius:4px;">
                                <div style="font-size:0.85em;color:#666;margin-top:4px;">Get voice IDs from ElevenLabs dashboard</div>
                                <div style="font-size:0.85em;color:#e63946;margin-top:8px;">&#x1F4B0; Requires ElevenLabs API key & credits</div>
                            </div>
                        </div>
                    </div>
                    <button id="sendButton">Send</button>
                </div>
                <div class="bottom-bar">
                    <button id="connectBtn" class="connect-btn" title="Check gateway connection">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">Checking&#x2026;</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Config Modal -->
    <div id="configModal" class="config-modal">
        <div class="config-modal-content">
            <div class="config-modal-header">
                <h2>&#x2699;&#xFE0F; Configuration</h2>
                <button class="theme-toggle" id="matrixToggle" onclick="app.toggleMatrixTheme()" title="Toggle Matrix Theme">MATRIX</button>
                <button class="config-modal-close" id="configModalClose">&#x2715;</button>
            </div>
            <div class="config-tabs" id="configTabs" style="display: none;">
                <!-- Tabs will be dynamically populated -->
            </div>
            <div class="config-modal-body" id="configModalBody">
                <div class="config-loading" style="padding: 40px; text-align: center; color: #9ca3af;">Loading configuration...</div>
            </div>
        </div>
    </div>

    <script>
        const STORE_KEY    = 'picoclaw_sessions_v2';
        const SIDEBAR_KEY  = 'picoclaw_sidebar_width';

        function loadStore()    { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } }
        function saveStore(s)   { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {} }
        function makeSession(n) { return { id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2), name: n, messages: [] }; }
        function defaultStore() { const s = makeSession('General'); return { sessions: [s], activeId: s.id }; }

        // Derive a chat title from the first user message (first line, max 42 chars)
        function titleFromMessage(text) {
            const line = text.split(/[\r\n]/)[0].trim();
            return line.length > 42 ? line.slice(0, 42).trimEnd() + '\u2026' : line;
        }

        class PicoClawApp {
            constructor() {
                this.store = loadStore() || defaultStore();
                this.isConnected = false;
                this.apiUrl = window.location.origin;
                this.configEditMode = false;
                this.configRawData = null;

                this.el = {
                    messages:       document.getElementById('messages'),
                    messageInput:   document.getElementById('messageInput'),
                    sendButton:     document.getElementById('sendButton'),
                    statusDot:      document.getElementById('statusDot'),
                    statusText:     document.getElementById('statusText'),
                    connectBtn:     document.getElementById('connectBtn'),
                    configBtn:      document.getElementById('configBtn'),
                    helpBtn:        document.getElementById('helpBtn'),
                    chatList:       document.getElementById('chatList'),
                    newChatBtn:     document.getElementById('newChatBtn'),
                    chatTitleBar:   document.getElementById('chatTitleBar'),
                    sidebar:        document.getElementById('sidebar'),
                    resizeHandle:   document.getElementById('sidebarResize'),
                    micBtn:         document.getElementById('micBtn'),
                    ttsControls:    document.getElementById('ttsControls'),
                    ttsBtn:         document.getElementById('ttsBtn'),
                    ttsPauseBtn:    document.getElementById('ttsPauseBtn'),
                    ttsStopBtn:     document.getElementById('ttsStopBtn'),
                    ttsSettingsBtn: document.getElementById('ttsSettingsBtn'),
                    ttsPopover:     document.getElementById('ttsPopover'),
                    ttsEngineSelect: document.getElementById('ttsEngineSelect'),
                    ttsEngineBrowserOptions: document.getElementById('ttsEngineBrowserOptions'),
                    ttsEngineEdgeOptions: document.getElementById('ttsEngineEdgeOptions'),
                    ttsEngineElevenlabsOptions: document.getElementById('ttsEngineElevenlabsOptions'),
                    edgeTtsVoice:   document.getElementById('edgeTtsVoice'),
                    edgeTtsRate:    document.getElementById('edgeTtsRate'),
                    edgeTtsRateVal: document.getElementById('edgeTtsRateVal'),
                    elevenlabsTtsVoice: document.getElementById('elevenlabsTtsVoice'),
                    ttsLangSelect:  document.getElementById('ttsLangSelect'),
                    ttsVoiceSelect: document.getElementById('ttsVoiceSelect'),
                    ttsRate:        document.getElementById('ttsRate'),
                    ttsVolume:      document.getElementById('ttsVolume'),
                    ttsPitch:       document.getElementById('ttsPitch'),
                    ttsRateVal:     document.getElementById('ttsRateVal'),
                    ttsVolumeVal:   document.getElementById('ttsVolumeVal'),
                    ttsPitchVal:    document.getElementById('ttsPitchVal'),
                    configModal:    document.getElementById('configModal'),
                    configModalBody: document.getElementById('configModalBody'),
                    configModalClose: document.getElementById('configModalClose'),
                    configTabs:     document.getElementById('configTabs'),
                };
                this.configData = null;
                this.activeConfigTab = 'overview';

                this.el.sendButton.addEventListener('click',   () => this.sendMessage());
                this.el.messageInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMessage(); }
                });
                this.el.connectBtn.addEventListener('click', () => this.checkConnection());
                this.el.configBtn.addEventListener('click', () => this.showConfig());
                this.el.helpBtn.addEventListener('click', () => this.showHelp());
                this.el.newChatBtn.addEventListener('click', () => this.newChat());
                this.el.micBtn.addEventListener('click', () => this.toggleRecording());
                this.el.ttsBtn.addEventListener('click',       () => this.toggleTts());
                this.el.ttsPauseBtn.addEventListener('click',   () => this.ttsPauseResume());
                this.el.ttsStopBtn.addEventListener('click',    () => this.ttsStop());
                this.el.ttsSettingsBtn.addEventListener('click', e => { e.stopPropagation(); this.el.ttsPopover.classList.toggle('open'); });
                document.addEventListener('click', () => this.el.ttsPopover.classList.remove('open'));
                this.el.ttsPopover.addEventListener('click', e => e.stopPropagation());
                this.el.configModalClose.addEventListener('click', () => this.hideConfigModal());
                this.el.configModal.addEventListener('click', (e) => {
                    if (e.target === this.el.configModal) this.hideConfigModal();
                });

                // Load TTS prefs
                const ttsPrefs = JSON.parse(localStorage.getItem('picoclaw_tts') || '{}');
                this.ttsEngine    = ttsPrefs.engine || 'browser';
                this.ttsVoiceName = ttsPrefs.voice  || '';
                this.ttsLang      = ttsPrefs.lang   || '';
                this.el.ttsRate.value   = ttsPrefs.rate   ?? 1;
                this.el.ttsVolume.value = ttsPrefs.volume ?? 1;
                this.el.ttsPitch.value  = ttsPrefs.pitch  ?? 1;
                this.el.ttsEngineSelect.value = this.ttsEngine;
                this.el.edgeTtsVoice.value = ttsPrefs.edgeVoice || 'en-US-MichelleNeural';
                this.el.edgeTtsRate.value = ttsPrefs.edgeRate || 0;
                this.el.elevenlabsTtsVoice.value = ttsPrefs.elevenlabsVoice || '';
                this._updateTtsLabels();
                this._updateTtsEngineOptions();
                // Update edge-tts rate label
                const edgeRate = this.el.edgeTtsRate.value;
                this.el.edgeTtsRateVal.textContent = (edgeRate > 0 ? '+' : '') + edgeRate + '%';

                this.el.ttsEngineSelect.addEventListener('change', () => { 
                    this.ttsEngine = this.el.ttsEngineSelect.value;
                    this._updateTtsEngineOptions();
                    this._saveTtsPrefs();
                });
                this.el.edgeTtsRate.addEventListener('input', () => { 
                    this.el.edgeTtsRateVal.textContent = (this.el.edgeTtsRate.value > 0 ? '+' : '') + this.el.edgeTtsRate.value + '%';
                    this._saveTtsPrefs();
                });
                this.el.edgeTtsVoice.addEventListener('change', () => { this._saveTtsPrefs(); });
                this.el.elevenlabsTtsVoice.addEventListener('input', () => { this._saveTtsPrefs(); });
                this.el.ttsRate.addEventListener('input',   () => { this._updateTtsLabels(); this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });
                this.el.ttsVolume.addEventListener('input', () => { this._updateTtsLabels(); this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });
                this.el.ttsPitch.addEventListener('input',  () => { this._updateTtsLabels(); this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });
                this.el.ttsLangSelect.addEventListener('change', () => {
                    this.ttsLang = this.el.ttsLangSelect.value;
                    this.ttsVoiceName = '';
                    this._fillVoicesByLang();
                    this._saveTtsPrefs();
                    this._ttsRestartIfPlaying();
                });
                this.el.ttsVoiceSelect.addEventListener('change', () => { this.ttsVoiceName = this.el.ttsVoiceSelect.value; this._saveTtsPrefs(); this._ttsRestartIfPlaying(); });

                // Friendly language name helper using Intl where available
                const langDisplay = (() => {
                    try { const dn = new Intl.DisplayNames(['en'], { type: 'language' }); return tag => dn.of(tag); }
                    catch { return tag => tag; }
                })();

                // Populate voice list (voices load async in most browsers)
                const fillVoices = () => {
                    const voices = speechSynthesis.getVoices();
                    console.log('TTS voices loaded:', voices.length);
                    if (!voices.length) {
                        console.warn('No TTS voices available yet, waiting for voiceschanged event...');
                        return;
                    }

                    // Group by base language code (e.g. 'en' from 'en-US', 'en-GB')
                    // so all English voices appear under one "English" entry.
                    const langMap = new Map(); // base-code -> display name
                    voices.forEach(v => {
                        const base = v.lang.split('-')[0];
                        if (!langMap.has(base)) {
                            langMap.set(base, langDisplay(base) || base);
                        }
                    });
                    const langs = [...langMap.entries()].sort((a, b) => a[1].localeCompare(b[1]));
                    console.log('Available languages:', langs.length);

                    const savedBase = this.ttsLang || 'en';
                    this.el.ttsLangSelect.innerHTML =
                        langs.map(([base, name]) =>
                            `<option value="${base}" ${base === savedBase ? 'selected' : ''}>${name}</option>`
                        ).join('');
                    this.ttsLang = savedBase;

                    this._allVoices = voices;
                    this._fillVoicesByLang();
                    console.log('TTS initialization complete. Engine:', this.ttsEngine);
                };
                
                // Try filling immediately (works in Firefox)
                fillVoices();
                
                // Also listen for voiceschanged event (required for Chrome/Edge)
                speechSynthesis.addEventListener('voiceschanged', fillVoices);
                
                // Fallback: retry after a short delay if still no voices
                setTimeout(() => {
                    if (!this._allVoices || this._allVoices.length === 0) {
                        console.log('Retrying voice initialization...');
                        fillVoices();
                    }
                }, 500);

                this.ttsEnabled     = false;
                this.ttsSelectedEl  = null;
                this._ttsState      = 'idle'; // 'idle' | 'playing' | 'paused'
                this.mediaRecorder  = null;
                this.audioChunks    = [];
                this._audioCtx      = null;
                this._levelRaf      = null;

                this._initResize();
                this.checkCapabilities();
                this.renderSidebar();
                this.renderMessages();
                this.checkConnection();
                
                // Load current model display on startup
                this.updateCurrentModel();
                
                // Check connection every 5 seconds
                setInterval(() => this.checkConnection(), 5000);
            }

            //  Sidebar drag resize 
            _initResize() {
                const sidebar = this.el.sidebar;
                const handle  = this.el.resizeHandle;

                // Restore saved width
                const saved = parseInt(localStorage.getItem(SIDEBAR_KEY));
                if (saved && saved >= 130 && saved <= 480) sidebar.style.width = saved + 'px';

                handle.addEventListener('mousedown', e => {
                    e.preventDefault();
                    const startX = e.clientX;
                    const startW = sidebar.offsetWidth;
                    handle.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';

                    const onMove = ev => {
                        const w = Math.max(130, Math.min(480, startW + ev.clientX - startX));
                        sidebar.style.width = w + 'px';
                    };
                    const onUp = () => {
                        handle.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        localStorage.setItem(SIDEBAR_KEY, sidebar.offsetWidth);
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            }

            //  Session management 
            get active() {
                return this.store.sessions.find(s => s.id === this.store.activeId) || this.store.sessions[0];
            }

            switchTo(id) {
                this.store.activeId = id;
                saveStore(this.store);
                this.renderSidebar();
                this.renderMessages();
            }

            newChat() {
                const s = makeSession('New chat');
                this.store.sessions.push(s);
                this.store.activeId = s.id;
                saveStore(this.store);
                this.renderSidebar();
                this.renderMessages();
                // Focus input so user can just start typing
                this.el.messageInput.focus();
            }

            deleteSession(id) {
                if (this.store.sessions.length === 1) { alert("Can't delete the last chat."); return; }
                if (!confirm('Delete this chat and all its messages?')) return;
                this.store.sessions = this.store.sessions.filter(s => s.id !== id);
                if (this.store.activeId === id) this.store.activeId = this.store.sessions[0].id;
                saveStore(this.store);
                this.renderSidebar();
                this.renderMessages();
            }

            startRename(nameEl, id) {
                nameEl.contentEditable = 'true';
                nameEl.focus();
                const range = document.createRange();
                range.selectNodeContents(nameEl);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);

                const finish = () => {
                    nameEl.contentEditable = 'false';
                    const s = this.store.sessions.find(s => s.id === id);
                    if (s && nameEl.textContent.trim()) {
                        s.name = nameEl.textContent.trim();
                        saveStore(this.store);
                        this.el.chatTitleBar.textContent = s.name;
                    }
                    this.renderSidebar();
                };
                nameEl.addEventListener('blur', finish, { once: true });
                nameEl.addEventListener('keydown', e => {
                    if (e.key === 'Enter')  { e.preventDefault(); nameEl.blur(); }
                    if (e.key === 'Escape') { nameEl.contentEditable = 'false'; this.renderSidebar(); }
                }, { once: true });
            }

            //  Render 
            renderSidebar() {
                const list = this.el.chatList;
                list.innerHTML = '';
                this.store.sessions.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'chat-item' + (s.id === this.store.activeId ? ' active' : '');
                    item.dataset.id = s.id;
                    item.innerHTML =
                        '<span class="chat-item-icon">&#x1F4AC;</span>' +
                        '<span class="chat-item-name">' + this.escapeHtml(s.name) + '</span>' +
                        '<button class="chat-item-rename" title="Rename">&#x270F;</button>' +
                        '<button class="chat-item-delete" title="Delete">&#x2715;</button>';

                    item.addEventListener('click', e => {
                        if (e.target.closest('.chat-item-delete')) return;
                        if (e.target.closest('.chat-item-rename')) return;
                        if (e.target.closest('.chat-item-name')?.contentEditable === 'true') return;
                        this.switchTo(s.id);
                    });
                    item.querySelector('.chat-item-name').addEventListener('dblclick', e => {
                        e.stopPropagation();
                        this.startRename(e.currentTarget, s.id);
                    });
                    item.querySelector('.chat-item-rename').addEventListener('click', e => {
                        e.stopPropagation();
                        this.startRename(item.querySelector('.chat-item-name'), s.id);
                    });
                    item.querySelector('.chat-item-delete').addEventListener('click', e => {
                        e.stopPropagation();
                        this.deleteSession(s.id);
                    });
                    list.appendChild(item);
                });
                this.el.chatTitleBar.textContent = this.active?.name ?? '';
                this.el.chatTitleBar.onclick = () => {
                    if (!this.active) return;
                    const nameEl = list.querySelector('.chat-item[data-id="' + this.active.id + '"] .chat-item-name');
                    if (nameEl) this.startRename(nameEl, this.active.id);
                };
            }

            renderMessages() {
                const session = this.active;
                const box = this.el.messages;
                box.innerHTML = '';

                if (session.messages.length === 0) {
                    const w = document.createElement('div');
                    w.className = 'message system';
                    w.textContent = 'Start chatting \u2014 messages are saved per chat.';
                    box.appendChild(w);
                } else {
                    session.messages.forEach(m => this._appendMessage(m));
                }
                this.el.chatTitleBar.textContent = session.name;
                this.scrollToBottom();

                // Auto-select the last assistant message as TTS target
                this._ttsAutoSelect();
            }

            //  Connection 
            async checkConnection() {
                this.setStatus('connecting', 'Checking\u2026');
                try {
                    const res = await fetch(this.apiUrl + '/api/status');
                    if (res.ok) {
                        const data = await res.json();
                        if (data.gateway?.running) {
                            this.setStatus('connected', 'Connected');
                            this.isConnected = true;
                        } else {
                            this.setStatus('error', 'Gateway not running');
                            this.isConnected = false;
                        }
                    } else {
                        this.setStatus('error', 'API not responding');
                    }
                } catch {
                    this.setStatus('error', 'Cannot reach API');
                }
            }

            setStatus(cls, text) {
                this.el.statusDot.className = 'status-dot ' + cls;
                this.el.statusText.textContent = text;
            }
            
            async updateCurrentModel() {
                try {
                    const response = await fetch('/api/config?raw=true');
                    if (response.ok) {
                        const data = await response.json();
                        const modelName = data.config?.agents?.defaults?.model_name;
                        
                        if (modelName) {
                            const modelBadge = document.getElementById('currentModel');
                            const modelNameEl = document.getElementById('modelName');
                            
                            if (modelBadge && modelNameEl) {
                                modelNameEl.textContent = modelName;
                                modelBadge.style.display = 'flex';
                                modelBadge.title = `Current AI Model: ${modelName}`;
                            }
                        }
                    }
                } catch (error) {
                    console.error('Failed to get current model:', error);
                }
            }
            
            async restartGateway() {
                try {
                    // For Electron app, we need to check if we're in that environment
                    // For now, just inform the user
                    const isElectron = window.process && window.process.type;
                    
                    if (isElectron) {
                        alert('&#x26A0;&#xFE0F; Please restart the Electron app for changes to take effect.\\n\\nClose the app and run "npm run electron" again.');
                    } else {
                        alert('&#x26A0;&#xFE0F; Please restart the PicoClaw gateway manually:\\n\\n1. Stop the gateway (Ctrl+C in terminal)\\n2. Restart: .\\\\build\\\\picoclaw.exe gateway\\n\\nOr restart the web interface if using api-server.js');
                    }
                } catch (error) {
                    console.error('Gateway restart error:', error);
                    alert('&#x26A0;&#xFE0F; Failed to restart gateway: ' + error.message);
                }
            }

            async showConfig() {
                this.el.configModal.classList.add('show');
                this.el.configModalBody.innerHTML = '<div class="config-loading" style="padding: 40px; text-align: center; color: #9ca3af;">Loading configuration...</div>';
                this.el.configTabs.classList.remove('loaded');
                this.el.configTabs.style.display = 'none';
                this.configEditMode = false;
                
                // Restore Matrix theme preference
                const savedTheme = localStorage.getItem('picoclaw-config-theme');
                const modalContent = document.querySelector('.config-modal-content');
                const toggleBtn = document.getElementById('matrixToggle');
                if (savedTheme === 'matrix') {
                    modalContent.classList.add('matrix-theme');
                    toggleBtn.textContent = 'NORMAL';
                } else {
                    modalContent.classList.remove('matrix-theme');
                    toggleBtn.textContent = 'MATRIX';
                }
                
                try {
                    // Fetch masked config for display
                    const response = await fetch('/api/config');
                    const data = await response.json();
                    
                    if (!response.ok) {
                        this.el.configModalBody.innerHTML = `
                            <div class="config-tabcontent active" style="display: block;">
                                <div class="config-error">
                                    <strong>&#x26A0;&#xFE0F; ${data.error}</strong>
                                    <p>${data.suggestion || data.message || ''}</p>
                                    ${data.path ? `<p><strong>Expected path:</strong> ${data.path}</p>` : ''}
                                </div>
                            </div>
                        `;
                        return;
                    }
                    
                    // Fetch raw config for editing
                    const rawResponse = await fetch('/api/config?raw=true');
                    const rawData = await rawResponse.json();
                    
                    this.configData = data;
                    this.configRawData = rawData;
                    this.renderConfigTabs();
                    this.renderAllTabContent();
                } catch (error) {
                    this.el.configModalBody.innerHTML = `
                        <div class="config-tabcontent active" style="display: block;">
                            <div class="config-error">
                                <strong>&#x26A0;&#xFE0F; Failed to load configuration</strong>
                                <p>${error.message}</p>
                                <p>Make sure the PicoClaw web interface server is running.</p>
                            </div>
                        </div>
                    `;
                }
            }

                const config = this.configData.config;
                const tabs = [
                    { id: 'overview', label: '&#x1F4CB; Overview', icon: '&#x1F4CB;' },
                    { id: 'agents', label: '&#x1F916; Agents', icon: '&#x1F916;' },
                    { id: 'model_list', label: '&#x1F9E0; Models', icon: '&#x1F9E0;' },
                    { id: 'channels', label: '&#x1F4AC; Channels', icon: '&#x1F4AC;' },
                    { id: 'gateway', label: '&#x1F310; Gateway', icon: '&#x1F310;' },
                    { id: 'session', label: '&#x1F511; Session', icon: '&#x1F511;' },
                    { id: 'providers', label: '&#x1F50C; Providers', icon: '&#x1F50C;' },
                    { id: 'skills', label: '&#x1F3AF; Skills', icon: '&#x1F3AF;' },
                    { id: 'tools', label: '&#x1F527; Tools', icon: '&#x1F527;' },
                    { id: 'cron', label: '&#x23F0; CRON (Scheduled)', icon: '&#x23F0;' },
                    { id: 'voice', label: '&#x1F3A4; Voice', icon: '&#x1F3A4;' },
                    { id: 'logging', label: '&#x1F4DD; Logging', icon: '&#x1F4DD;' },
                ];
                
                // Filter tabs to only show sections that exist in config
                const availableTabs = tabs.filter(tab => {
                    if (tab.id === 'overview') return true;
                    return config[tab.id] !== undefined;
                });
                
                if (availableTabs.length === 0) {
                    console.error('No tabs available to render');
                    return;
                }
                
                console.log('Rendering', availableTabs.length, 'config tabs:', availableTabs.map(t => t.id).join(', '));
                
                this.el.configTabs.innerHTML = availableTabs.map(tab => 
                    `<button class="config-tab ${tab.id === this.activeConfigTab ? 'active' : ''}" 
                             data-tab-id="${tab.id}"
                             onclick="app.switchConfigTab('${tab.id}')">
                        ${tab.label}
                    </button>`
                ).join('');
                
                this.el.configTabs.classList.add('loaded');
                this.el.configTabs.style.display = 'flex';
            }
            
            switchConfigTab(tabId) {
                this.activeConfigTab = tabId;
                // Hide all tab content
                this.el.configModalBody.querySelectorAll('.config-tabcontent').forEach(content => {
                    content.classList.remove('active');
                });
                // Show selected tab content
                const targetContent = document.getElementById('config-tab-' + tabId);
                if (targetContent) {
                    targetContent.classList.add('active');
                }
                // Update tab buttons
                this.el.configTabs.querySelectorAll('.config-tab').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-tab-id') === tabId);
                });
                // Re-adjust tooltip positions for new tab
                setTimeout(() => this.adjustTooltipPositions(), 50);
            }
            
            adjustTooltipPositions() {
                // Smart tooltip positioning based on location in modal
                const tooltips = document.querySelectorAll('.config-tooltip');
                const modal = document.querySelector('.config-modal-content');
                if (!modal) return;
                
                const modalRect = modal.getBoundingClientRect();
                const modalCenter = modalRect.left + modalRect.width / 2;
                
                tooltips.forEach(tooltip => {
                    const tooltipRect = tooltip.getBoundingClientRect();
                    const tooltipCenter = tooltipRect.left + tooltipRect.width / 2;
                    
                    // Remove existing classes
                    tooltip.classList.remove('tooltip-left', 'tooltip-right');
                    
                    // Add class based on position
                    if (tooltipCenter < modalCenter) {
                        tooltip.classList.add('tooltip-left');
                    } else {
                        tooltip.classList.add('tooltip-right');
                    }
                });
            }

            renderAllTabContent() {
                const data = this.configData;
                const config = data.config;
                const lastModified = new Date(data.lastModified).toLocaleString();
                
                const tabs = [
                    { id: 'overview', label: '&#x1F4CB; Overview' },
                    { id: 'agents', label: '&#x1F916; Agents' },
                    { id: 'model_list', label: '&#x1F9E0; Models' },
                    { id: 'channels', label: '&#x1F4AC; Channels' },
                    { id: 'gateway', label: '&#x1F310; Gateway' },
                    { id: 'session', label: '&#x1F511; Session' },
                    { id: 'providers', label: '&#x1F50C; Providers' },
                    { id: 'skills', label: '&#x1F3AF; Skills' },
                    { id: 'tools', label: '&#x1F527; Tools' },
                    { id: 'cron', label: '&#x23F0; CRON (Scheduled)' },
                    { id: 'voice', label: '&#x1F3A4; Voice' },
                    { id: 'logging', label: '&#x1F4DD; Logging' },
                ];
                
                // Create content for all available tabs
                const tabContents = [];
                
                tabs.forEach(tab => {
                    if (tab.id === 'overview' || config[tab.id] !== undefined) {
                        const isActive = tab.id === this.activeConfigTab;
                        let content = '';
                        
                        if (tab.id === 'overview') {
                            if (this.configEditMode) {
                                content = `
                                    <div class="config-info">
                                        <strong>&#x270F;&#xFE0F; Edit Configuration</strong>
                                        <p>Editing the raw JSON configuration. Make sure the JSON is valid before saving.</p>
                                    </div>
                                    <textarea id="config-edit-textarea" class="config-edit-textarea">${JSON.stringify(this.configRawData.config, null, 4)}</textarea>
                                    <div class="config-edit-actions">
                                        <button class="config-btn config-btn-success" onclick="app.saveOverview()">&#x1F4BE; Save Configuration</button>
                                        <button class="config-btn config-btn-secondary" onclick="app.cancelEditOverview()">&#x274C; Cancel</button>
                                    </div>
                                `;
                            } else {
                                content = `
                                    <div class="config-info">
                                        <strong>&#x1F4C1; Config File Location:</strong>
                                        <code>${data.path}</code><br>
                                        <strong>&#x1F55C; Last Modified:</strong> ${lastModified}
                                    </div>
                                    <div class="config-edit-actions">
                                        <button class="config-btn config-btn-primary" onclick="app.editOverview()">&#x1F4DD; Edit Raw JSON</button>
                                    </div>
                                    <div class="config-info">
                                        <strong>&#x1F680; Quick Start:</strong><br>
                                        &#x2022; Configure <strong>Agents</strong> settings for default behavior<br>
                                        &#x2022; Add AI models in <strong>Models</strong> tab with API keys<br>
                                        &#x2022; Enable and configure <strong>Channels</strong> for messaging platforms<br>
                                        &#x2022; Adjust <strong>Gateway</strong> settings for API server<br>
                                        <br>
                                        <strong>&#x1F4CB; Configuration Sections:</strong><br>
                                        ${Object.keys(config).map(key => `&#x2022; ${key}`).join('<br>')}
                                    </div>
                                    <div class="config-json">${JSON.stringify(config, null, 2)}</div>
                                `;
                            }
                        } else {
                            const sectionData = config[tab.id];
                            if (sectionData === undefined) {
                                content = `
                                    <div class="config-info">
                                        <strong>&#x26A0;&#xFE0F; Section Not Configured</strong>
                                        <p>The "${tab.id}" section is not present in your configuration file.</p>
                                    </div>
                                `;
                            } else {
                                // Generate form for this section
                                content = this.renderConfigForm(tab.id, sectionData);
                            }
                        }
                        
                        tabContents.push(`
                            <div id="config-tab-${tab.id}" class="config-tabcontent ${isActive ? 'active' : ''}">
                                ${content}
                            </div>
                        `);
                    }
                });
                
                this.el.configModalBody.innerHTML = tabContents.join('');
                
                // Adjust tooltip positions after rendering
                setTimeout(() => {
                    this.adjustTooltipPositions();
                }, 100);
                
                // Trigger initial model config display for agents tab
                setTimeout(() => {
                    const trigger = document.getElementById('model-trigger');
                    if (trigger) {
                        const modelName = trigger.getAttribute('data-model');
                        if (modelName) {
                            this.showSelectedModelConfig(modelName);
                        }
                    }
                }, 50);
            }

            renderConfigForm(sectionId, sectionData) {
                const rawData = this.configRawData.config[sectionId];
                const schema = this.getConfigSchema()[sectionId] || {};
                const tabMeta = this.getTabMetadata(sectionId);
                
                let formHtml = `
                    <div class="config-info" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 16px; border-radius: 8px; margin-bottom: 16px;">
                        <strong style="font-size: 1.1rem;">&#x2139;&#xFE0F; About: ${tabMeta.acronym || tabMeta.fullName}</strong>
                        <p style="margin: 8px 0 0 0; line-height: 1.5;">${tabMeta.purpose}</p>
                    </div>
                    <div class="config-info" style="background: #f0f9ff; border-color: #38bdf8; margin-bottom: 16px;">
                        <strong>&#x1F4A1; What to configure here:</strong>
                        <p style="white-space: pre-line; margin: 8px 0 0 0; line-height: 1.6;">${tabMeta.whatToInput}</p>
                    </div>
                    <form class="config-form" id="config-form-${sectionId}" onsubmit="event.preventDefault(); app.saveConfigSection('${sectionId}')">
                `;
                
                if (sectionId === 'agents' && sectionData.defaults) {
                    formHtml += '<div class="config-form-section"><div class="config-form-section-title">&#x1F916; Agent Defaults</div>';
                    
                    // Render model_name as a dropdown with all available models
                    const modelList = this.configData.config.model_list || [];
                    const currentModel = rawData?.defaults?.model_name || sectionData.defaults.model_name;
                    
                    formHtml += `
                        <div class="config-form-group">
                            <label class="config-form-label" for="agents-defaults-model_name">
                                Default Model
                                <span class="config-tooltip">&#x2139;&#xFE0F;<span class="config-tooltip-text">Select which AI model to use by default. Configure models below or in the Models tab.</span></span>
                            </label>
                            <select class="config-form-input" id="agents-defaults-model_name" name="agents.defaults.model_name" 
                                    onchange="app.showSelectedModelConfig(this.value)">
                                <option value="">-- Select a model --</option>
                                ${modelList.map(m => `<option value="${this.escapeHtml(m.model_name)}" ${m.model_name === currentModel ? 'selected' : ''}>${this.escapeHtml(m.model_name)} (${this.escapeHtml(m.model || 'unknown')})</option>`).join('')}
                            </select>
                        </div>
                        <div id="selected-model-config"></div>
                    `;
                    
                    // Render other agent defaults (except model_name since we handled it above)
                    for (const key in sectionData.defaults) {
                        if (key !== 'model_name') {
                            const value = sectionData.defaults[key];
                            const rawValue = rawData?.defaults ? rawData.defaults[key] : value;
                            const fieldSchema = schema.defaults?.[key];
                            const fieldId = `agents-defaults-${key}`;
                            const fieldName = `agents.defaults.${key}`;
                            
                            if (fieldSchema) {
                                formHtml += this.renderField(key, rawValue, fieldId, fieldName, fieldSchema);
                            }
                        }
                    }
                    
                    formHtml += '</div>';
                    
                    // Add a data attribute to trigger initial load
                    formHtml += '<div id="model-trigger" data-model="' + this.escapeHtml(currentModel) + '" style="display:none;"></div>';
                } else if (sectionId === 'gateway') {
                    formHtml += '<div class="config-form-section"><div class="config-form-section-title">&#x1F310; Gateway Settings</div>';

                            &#x2022; <strong>Free Options:</strong> edge-tts (Microsoft), espeak, festival, local whisper<br>

                                const rawProvider = rawTool ? rawTool[providerName] : provider;

                                formHtml += `
                                    <div class="config-form-section" style="margin-top: 12px; background: #f0fdfa; border: 1px solid #5eead4;">
                                        <div class="config-form-section-title">${providerInfo.icon} ${providerInfo.title}</div>
                                        ${providerInfo.description ? `
                                            <div class="config-info" style="background: #ccfbf1; border-color: #5eead4; font-size: 0.85rem;">
                                                <strong>&#x2139;&#xFE0F; About:</strong> ${providerInfo.description}<br>
                                                ${providerInfo.link ? `<strong>&#x1F511; Get API Key:</strong> <a href="${providerInfo.link}" target="_blank" style="color: #0891b2; text-decoration: underline;">${providerInfo.link}</a><br>` : ''}
                                                ${providerInfo.pricing ? `<strong>&#x1F4B0; Pricing:</strong> ${providerInfo.pricing}<br>` : ''}
                                                ${providerInfo.note ? `<strong>&#x1F4A1; Note:</strong> ${providerInfo.note}` : ''}
                                            </div>
                                        ` : ''}
                                        ${this.renderFieldsFromSchema(provider, rawProvider, `tools.web.${providerName}`, schema._common || {})}
                                    </div>
                                `;
                            }
                            
                            formHtml += `</div>`;
                        } else {
                            // Regular tool rendering with metadata
                            const toolMeta = this.getToolMetadata(toolName);
                            formHtml += `
                                <div class="config-form-section">
                                    <div class="config-form-section-title">&#x1F527; ${toolMeta.fullName}</div>
                                    <div class="config-info" style="background: #eff6ff; border-color: #93c5fd; font-size: 0.85rem; margin-bottom: 12px;">
                                        <strong>&#x2139;&#xFE0F; About:</strong> ${toolMeta.description}
                                    </div>
                                    ${this.renderFieldsFromSchema(tool, rawTool, `tools.${toolName}`, schema._common || {})}
                                </div>
                            `;
                        }
                    }
                } else if (sectionId === 'skills' && typeof sectionData === 'object') {
                    for (const skillName in sectionData) {
                        const skill = sectionData[skillName];
                        const rawSkill = rawData ? rawData[skillName] : skill;
                        formHtml += `
                            <div class="config-form-section">
                                <div class="config-form-section-title">&#x1F3AF; ${skillName.toUpperCase()}</div>
                                ${this.renderFieldsFromSchema(skill, rawSkill, `skills.${skillName}`, schema._common || {})}
                            </div>
                        `;
                    }
                } else if (sectionId === 'cron' && typeof sectionData === 'object') {
                    // Add helpful description for CRON section
                    formHtml += `
                        <div class="config-info" style="background: #fef3c7; border-color: #fcd34d; margin-bottom: 12px;">
                            <strong>&#x23F0; About CRON (Scheduled Commands):</strong> Schedule commands to run automatically at specified times using cron expressions. Perfect for automation, backups, and periodic tasks. Format: <code>minute hour day month weekday</code>
                        </div>
                    `;
                    
                    if (Array.isArray(sectionData.jobs)) {
                        sectionData.jobs.forEach((job, idx) => {
                            const rawJob = rawData?.jobs ? rawData.jobs[idx] : job;
                            const cronSchema = this.getConfigSchema().cron?.jobs || {};
                            formHtml += `
                                <div class="config-form-section">
                                    <div class="config-form-section-title">&#x23F0; Job ${idx + 1}: ${this.escapeHtml(job.name || 'Unnamed')}</div>
                                    ${this.renderFieldsFromSchema(job, rawJob, `cron.jobs.[${idx}]`, cronSchema)}
                                </div>
                            `;
                        });
                    } else {
                        formHtml += '<div class="config-form-section">';
                        formHtml += '<div class="config-form-section-title">&#x23F0; Cron Settings</div>';
                        formHtml += this.renderFieldsFromSchema(sectionData, rawData, 'cron', {});
                        formHtml += '</div>';
                    }
                } else if (typeof sectionData === 'object' && !Array.isArray(sectionData)) {
                    // Generic object rendering with auto-detected fields
                    formHtml += '<div class="config-form-section">';
                    formHtml += `<div class="config-form-section-title">&#x2699;&#xFE0F; ${sectionId.toUpperCase().replace('_', ' ')} Settings</div>`;
                    formHtml += this.renderFieldsFromSchema(sectionData, rawData, sectionId, {});
                    formHtml += '</div>';
                } else {
                    // Complex data structures - show JSON
                    formHtml += `<div class="config-json">${JSON.stringify(sectionData, null, 2)}</div>`;
                    formHtml += `<div class="config-info"><strong>&#x2139;&#xFE0F; Note:</strong> Use the Overview tab's Edit mode to modify this section.</div>`;
                    return formHtml + `</form>`;
                }
                
                formHtml += `
                    <div class="config-edit-actions">
                        <button type="submit" class="config-btn config-btn-success">&#x1F4BE; Save Changes</button>
                        <button type="button" class="config-btn config-btn-secondary" onclick="app.showConfig()">&#x267B;&#xFE0F; Reset</button>
                    </div>
                </form>
                `;
                
                return formHtml;
            }

            renderFieldsFromSchema(data, rawData, path, schema) {
                let html = '';
                
                for (const key in data) {
                    const value = data[key];
                    const rawValue = rawData ? rawData[key] : value;
                    const fieldSchema = schema[key] || (schema._common ? schema._common[key] : null);
                    const fieldId = `${path}.${key}`.replace(/\./g, '-');
                    const fieldName = `${path}.${key}`;
                    
                    if (fieldSchema) {
                        html += this.renderField(key, rawValue, fieldId, fieldName, fieldSchema);
                    } else {
                        // Auto-detect type
                        const detectedType = this.detectFieldType(rawValue);
                        // Skip nested objects - they should be handled by custom rendering
                        if (detectedType === 'object') {
                            continue;
                        }
                        html += this.renderField(key, rawValue, fieldId, fieldName, {
                            type: detectedType,
                            label: this.beautifyLabel(key),
                            description: `Configuration value for ${key}`
                        });
                    }
                }
                
                return html;
            }

            renderField(key, value, fieldId, fieldName, schema) {
                const { type, label, description, min, max, step, placeholder, options } = schema;
                const tooltip = description ? `<span class="config-tooltip">&#x2139;&#xFE0F;<span class="config-tooltip-text">${this.escapeHtml(description)}</span></span>` : '';
                
                let fieldHtml = '';
                
                // Skip rendering nested objects
                if (type === 'object') {
                    return '';
                }
                
                if (type === 'boolean') {
                    fieldHtml = `
                        <div class="config-form-group">
                            <div class="config-checkbox-wrapper">
                                <input type="checkbox" class="config-form-input" id="${fieldId}" name="${fieldName}"
                                       ${value ? 'checked' : ''}>
                                <label class="config-checkbox-label" for="${fieldId}">
                                    <span>${label}</span>
                                    ${tooltip}
                                </label>
                            </div>
                        </div>
                    `;
                } else if (type === 'select') {
                    const selectOptions = options || [];
                    fieldHtml = `
                        <div class="config-form-group">
                            <label class="config-form-label" for="${fieldId}">
                                <span>${label}</span>
                                ${tooltip}
                            </label>
                            <select class="config-form-input" id="${fieldId}" name="${fieldName}">
                                <option value="">-- Select ${label} --</option>
                                ${selectOptions.map(opt => `
                                    <option value="${this.escapeHtml(opt.value)}" ${value === opt.value ? 'selected' : ''}>
                                        ${this.escapeHtml(opt.label)}
                                    </option>
                                `).join('')}
                            </select>
                        </div>
                    `;
                } else if (type === 'number') {
                    fieldHtml = `
                        <div class="config-form-group">
                            <label class="config-form-label" for="${fieldId}">
                                <span>${label}</span>
                                ${tooltip}
                            </label>
                            <div class="config-number-wrapper">
                                <input type="number" class="config-form-input" id="${fieldId}" name="${fieldName}"
                                       value="${value || ''}" 
                                       ${min !== undefined ? `min="${min}"` : ''}
                                       ${max !== undefined ? `max="${max}"` : ''}
                                       ${step !== undefined ? `step="${step}"` : ''}
                                       placeholder="${placeholder || ''}">
                                <div class="config-number-controls">
                                    <button type="button" class="config-number-btn" onclick="app.incrementNumber('${fieldId}', ${step || 1})">&#x25B2;</button>
                                    <button type="button" class="config-number-btn" onclick="app.decrementNumber('${fieldId}', ${step || 1})">&#x25BC;</button>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (type === 'password') {
                    const isMasked = value && value.includes('***');
                    fieldHtml = `
                        <div class="config-form-group">
                            <label class="config-form-label" for="${fieldId}">
                                <span>${label}</span>
                                ${tooltip}
                            </label>
                            <input type="password" class="config-form-input" id="${fieldId}" name="${fieldName}"
                                   value="${this.escapeHtml(value || '')}"
                                   placeholder="${isMasked ? '(unchanged)' : placeholder || 'Enter ' + label}">
                            ${isMasked ? `<div class="config-field-description">Leave blank to keep existing value</div>` : ''}
                        </div>
                    `;
                } else if (type === 'array') {
                    const arrayValue = Array.isArray(value) ? value.join(', ') : '';
                    fieldHtml = `
                        <div class="config-form-group">
                            <label class="config-form-label" for="${fieldId}">
                                <span>${label}</span>
                                ${tooltip}
                            </label>
                            <input type="text" class="config-form-input" id="${fieldId}" name="${fieldName}"
                                   value="${this.escapeHtml(arrayValue)}"
                                   placeholder="Comma-separated values">
                            <div class="config-field-description">Enter values separated by commas</div>
                        </div>
                    `;
                } else {
                    // Default to text input
                    fieldHtml = `
                        <div class="config-form-group">
                            <label class="config-form-label" for="${fieldId}">
                                <span>${label}</span>
                                ${tooltip}
                            </label>
                            <input type="text" class="config-form-input" id="${fieldId}" name="${fieldName}"
                                   value="${this.escapeHtml(value || '')}"
                                   placeholder="${placeholder || 'Enter ' + label}">
                        </div>
                    `;
                }
                
                return fieldHtml;
            }

            incrementNumber(fieldId, step) {
                const input = document.getElementById(fieldId);
                if (input) {
                    const val = parseFloat(input.value) || 0;
                    const max = input.max ? parseFloat(input.max) : Infinity;
                    input.value = Math.min(val + step, max);
                }
            }

            decrementNumber(fieldId, step) {
                const input = document.getElementById(fieldId);
                if (input) {
                    const val = parseFloat(input.value) || 0;
                    const min = input.min ? parseFloat(input.min) : -Infinity;
                    input.value = Math.max(val - step, min);
                }
            }

            detectFieldType(value) {
                if (typeof value === 'boolean') return 'boolean';
                if (typeof value === 'number') return 'number';
                if (Array.isArray(value)) return 'array';
                if (typeof value === 'object' && value !== null) return 'object'; // Skip rendering nested objects
                return 'string';
            }

            beautifyLabel(key) {
                return key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            }

            showSelectedModelConfig(modelName) {
                const container = document.getElementById('selected-model-config');
                if (!container) return;
                
                if (!modelName) {
                    container.innerHTML = '';
                    return;
                }
                
                const modelList = this.configData.config.model_list || [];
                const rawModelList = this.configRawData.config.model_list || [];
                const modelIndex = modelList.findIndex(m => m.model_name === modelName);
                
                if (modelIndex === -1) {
                    container.innerHTML = `<div class="config-info" style="background: #fff3cd; border-color: #ffc107; color: #856404;">&#x26A0;&#xFE0F; Model "${this.escapeHtml(modelName)}" not found in model_list. Add it in the Models tab.</div>`;
                    return;
                }
                
                const model = modelList[modelIndex];
                const rawModel = rawModelList[modelIndex] || model;
                const schema = this.getConfigSchema().model_list;
                
                let html = `
                    <div class="config-form-section" style="margin-top: 12px; background: #eff6ff; border-color: #bfdbfe;">
                        <div class="config-form-section-title">&#x2699;&#xFE0F; Configure: ${this.escapeHtml(modelName)}</div>
                        <div class="config-info" style="background: #dbeafe;">
                            <strong>Model:</strong> ${this.escapeHtml(model.model || 'Not specified')}<br>
                            <strong>Provider:</strong> ${this.escapeHtml(model.model?.split('/')[0] || 'Unknown')}
                        </div>
                `;
                
                // Render model configuration fields
                for (const key in model) {
                    if (key === 'model_name') continue; // Skip, already shown in dropdown
                    
                    const value = model[key];
                    const rawValue = rawModel[key];
                    const fieldSchema = schema[key];
                    const fieldId = `model_list-${modelIndex}-${key}`;
                    const fieldName = `model_list.[${modelIndex}].${key}`;
                    
                    if (fieldSchema) {
                        html += this.renderField(key, rawValue, fieldId, fieldName, fieldSchema);
                    } else {
                        html += this.renderField(key, rawValue, fieldId, fieldName, {
                            type: this.detectFieldType(rawValue),
                            label: this.beautifyLabel(key),
                            description: `Configuration value for ${key}`
                        });
                    }
                }
                
                html += `
                        <div class="config-field-description">
                            &#x2139;&#xFE0F; Changes here update the model in your model_list. Visit the Models tab to add/remove models.
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
            }

                this.configEditMode = false;
                this.renderAllTabContent();
